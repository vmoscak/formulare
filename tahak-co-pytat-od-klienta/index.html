<script>
/* ===========================================================================
   DÁTA — tu meníš situácie a otázky
=========================================================================== */
/* "Nová poistná zmluva" kategória bola vyradená — jej otázky (rodinný stav,
   príjem/výdavky, existujúce poistenie, najväčšia obava) sa dnes riešia už
   v dotazníku "Aké poistenie potrebujem" a Kalkulačke poistného krytia.
   Tu ostávajú len otázky, ku ktorým sa dostaneme až pri konkrétnej ponuke —
   upisovacie detaily, ktoré analýza nezbiera (a ani nemá). */
const CATEGORIES = {
  zivotne: {
    label: 'Životné poistenie', sub: 'Zdravotný a rizikový profil', tile: 'Ž',
    questions: [
      'Fajčíte, alebo máte rizikové zamestnanie/koníček?',
    ],
  },
  majetok: {
    label: 'Majetkové poistenie', sub: 'Nehnuteľnosť a domácnosť', tile: 'M',
    questions: [
      'Je nehnuteľnosť vo vlastníctve, alebo v hypotéke (vyžaduje banka poistenie)?',
      'Aký je typ stavby a rok výstavby?',
      'Aká je odhadovaná hodnota nehnuteľnosti a vybavenia domácnosti?',
      'Máte v domácnosti cennejšie veci (elektronika, šperky, zbierky)?',
      'Stala sa Vám už niekedy škoda (voda, oheň, krádež)?',
    ],
  },
  zodpovednost: {
    label: 'Poistenie zodpovednosti', sub: 'Škoda tretej osobe', tile: 'Z',
    questions: [
      'Máte domáce zvieratá alebo deti, ktoré by mohli spôsobiť škodu tretej osobe?',
      'Venujete sa športu alebo aktivitám s vyšším rizikom škody?',
      'Mali ste v minulosti škodovú udalosť, za ktorú ste zodpovedali?',
    ],
  },
  auto: {
    label: 'Auto — PZP a havarijné', sub: 'Vozidlo', tile: 'A',
    questions: [
      'Aký je vek a hodnota vozidla?',
      'Kto všetko bude vozidlo šoférovať (aj mladý vodič)?',
      'Koľko km ročne najazdíte a na aké účely (súkromné/pracovné)?',
      'Parkuje vozidlo v garáži, alebo na ulici?',
      'Mali ste v posledných rokoch nejakú škodovú udalosť?',
    ],
  },
  // TODO: presunúť/zrušiť, keď pribudne krok "Ciele do budúcnosti" (II./III.
  // pilier, investície) medzi Kalkulačku poistného krytia a Checklist.
  dochodok: {
    label: 'Dôchodok a investície', sub: 'Dlhodobé sporenie', tile: 'D',
    questions: [
      'Koľko rokov Vám zostáva do dôchodku?',
      'Máte už II. alebo III. pilier? Akú sumu si mesačne odkladáte?',
      'Aký je Váš vzťah k riziku — konzervatívny, vyvážený, dynamický?',
      'Máte iné úspory alebo investície (nehnuteľnosť, akcie, sporenie)?',
      'Plánujete v budúcnosti nejaký väčší výdavok (dôchodok, štúdium detí)?',
    ],
  },
  podnikatel: {
    label: 'Podnikateľ / SZČO', sub: 'Firma a príjem', tile: 'P',
    questions: [
      'Aká je právna forma podnikania (živnosť, s.r.o.)?',
      'Máte zamestnancov? Koľko?',
      'Čo by sa stalo s príjmom firmy, keby ste Vy na dlhší čas vypadli?',
      'Máte poistenú zodpovednosť z podnikania / profesijnú zodpovednosť?',
      'Máte poistený majetok firmy (priestory, zásoby, vybavenie)?',
    ],
  },
};

const TOOL_NAME = 'tahak-co-pytat-od-klienta';

const state = {
  category: 'zivotne',
  answers: {},
  clientName: '',
};

/* ===========================================================================
   VYKRESLENIE
=========================================================================== */
const $ = id => document.getElementById(id);

function renderCategories(){
  $('categories').innerHTML = Object.keys(CATEGORIES).map(function(k){
    const c=CATEGORIES[k], sel=k===state.category?' sel':'';
    return '<div class="type'+sel+'" data-cat="'+k+'">'
      + '<div class="tile">'+c.tile+'</div>'
      + '<div><div class="t-label">'+c.label+'</div><div class="t-sub">'+c.sub+'</div></div></div>';
  }).join('');
}

function renderChecklist(){
  const cat = CATEGORIES[state.category];
  const answers = state.answers[state.category] || {};
  $('checklist').innerHTML = '<div style="font-weight:700; font-size:15px; color:#20242b; margin-bottom:14px;">'
    + cat.label + '</div>'
    + cat.questions.map(function(q, i){
        return '<div class="tq-row">'
          + '<div class="tq-question">'+escapeHtml(q)+'</div>'
          + '<input type="text" class="tq-answer" data-q="'+i+'" value="'+escapeHtml(answers[i]||'')+'" placeholder="Poznámka / odpoveď…">'
          + '</div>';
      }).join('');
}

function render(){
  var _av = CATEGORIES[state.category].tile;
  $('avatar').textContent = _av;
  renderChecklist();
}

function escapeHtml(x){ return String(x==null?'':x).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ===========================================================================
   AKCIE
=========================================================================== */
function doCopy(){
  const cat = CATEGORIES[state.category];
  const answers = state.answers[state.category] || {};
  const txt = cat.label + '\n\n' + cat.questions.map(function(q, i){
    const a = (answers[i]||'').trim();
    return q + (a ? '\n→ ' + a : '');
  }).join('\n\n');
  try{ if(navigator.clipboard) navigator.clipboard.writeText(txt); }catch(e){}
  const b=$('copyBtn'); b.textContent='Skopírované ✓'; setTimeout(function(){ b.textContent='Kopírovať zoznam'; },1600);
}

function doReset(){
  state.answers[state.category] = {};
  renderChecklist();
}

/* ===========================================================================
   PDF PRE KLIENTA (server-side Dompdf cez zdieľaný ../pdf.php, presné A4)
=========================================================================== */
function buildLetterHtml(){
  const cat = CATEGORIES[state.category];
  const answers = state.answers[state.category] || {};
  const clientName = state.clientName.trim() || 'Klient';
  const today = new Date();
  const SK_MONTHS = ['január','február','marec','apríl','máj','jún','júl','august','september','október','november','december'];
  const dateStr = today.getDate() + '. ' + SK_MONTHS[today.getMonth()] + ' ' + today.getFullYear();

  const rows = cat.questions.map(function(q, i){
    const a = (answers[i]||'').trim();
    return '<div class="q-item"><div class="q-txt">' + escapeHtml(q) + '</div>'
      + '<div class="q-ans' + (a?'':' q-ans-empty') + '">' + (a?escapeHtml(a):'—') + '</div></div>';
  }).join('');

  const css = `
    @font-face { font-family:'DejaVu Sans'; src:url('../vendor/dompdf/lib/fonts/DejaVuSans.ttf'); }
    @font-face { font-family:'DejaVu Sans'; font-weight:bold; src:url('../vendor/dompdf/lib/fonts/DejaVuSans-Bold.ttf'); }
    * { box-sizing:border-box; }
    div,p,span { margin:0; padding:0; }
    body { margin:0; padding:0; font-family:'DejaVu Sans',sans-serif; font-size:10.5pt; line-height:1.5; color:#20242b; background:#fff; }
    .pdf-topbar { height:3mm; background:#d97706; border-radius:0.8mm; margin-bottom:6mm; } .doctitle { text-align:center; font-size:16pt; letter-spacing:.5pt; font-weight:bold; padding:7pt 0 2pt; }
    .card-sub { text-align:center; font-size:10.5pt; color:#666; margin-bottom:5mm; }
    .meta { text-align:center; font-size:9pt; color:#8a8a8a; margin-bottom:9mm; padding-bottom:5mm; border-bottom:1pt solid #e5e5e5; }
    .cat-hd { color:#fff; background:#d97706; font-weight:bold; font-size:12pt; padding:3mm 4mm; border-radius:2mm; margin-bottom:5mm; }
    .q-item { padding:3mm 0; border-bottom:0.5pt solid #eef0f3; }
    .q-txt { font-size:10.5pt; margin-bottom:1.5mm; }
    .q-ans { font-size:10.5pt; font-weight:bold; color:#059669; }
    .q-ans-empty { font-weight:normal; color:#b0aca2; }
    @page{ margin:20mm 20mm 20mm 20mm; }
  `;

  return '<!DOCTYPE html><html lang="sk"><head>'
    + '<meta http-equiv="Content-Type" content="text/html; charset=utf-8">'
    + '<title>Ťahák čo pýtať od klienta</title><style>' + css + '</style></head><body>'
    + '<div class="pdf-topbar"></div><div class="doctitle">Čo pýtať od klienta</div>'
    + '<div class="card-sub">Poznámky zo stretnutia podľa situácie klienta</div>'
    + '<div class="meta">' + escapeHtml(clientName) + ' &middot; ' + dateStr + '</div>'
    + '<div class="cat-hd">' + escapeHtml(cat.label) + '</div>'
    + rows
    + '</body></html>';
}

function doPDF(){
  const btn = $('pdfBtn'); const orig = btn.textContent;
  btn.textContent = 'Generujem…'; btn.disabled = true;

  const html = buildLetterHtml();
  const filename = 'Co_pytat_od_klienta' + (state.clientName.trim() ? '_' + state.clientName.trim().replace(/\s+/g,'_') : '');

  fetch('../pdf.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ html: html, filename: filename })
  })
  .then(function(r){
    const ct = r.headers.get('Content-Type') || '';
    if (ct.includes('application/json') || ct.includes('text/')) {
      return r.text().then(function(t){ throw new Error('Server: ' + t); });
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.blob();
  })
  .then(function(blob){
    downloadOrSharePdfBlob(blob, filename);
    btn.textContent = orig; btn.disabled = false;
    logDocument(TOOL_NAME, state.clientName.trim() || 'Klient', state, undefined);
    loadMyDocuments();
  })
  .catch(function(e){
    console.error(e);
    btn.textContent = orig; btn.disabled = false;
    showToast('Chyba PDF: ' + e.message, 'error');
  });
}

/* ===========================================================================
   UDALOSTI
=========================================================================== */
function bind(){
  document.addEventListener('click', function(e){
    const c=e.target.closest('[data-cat]'); if(c){ state.category=c.dataset.cat; renderCategories(); render(); return; }
  });
  // Priebežné písanie do poznámky sa neprekresľuje (stratil by sa focus/kurzor) —
  // stačí uložiť do state, vstupné pole už zobrazuje to, čo poradca píše.
  document.addEventListener('input', function(e){
    if(e.target.matches('.tq-answer[data-q]')){
      const i = +e.target.dataset.q;
      if(!state.answers[state.category]) state.answers[state.category] = {};
      state.answers[state.category][i] = e.target.value;
    }
  });
  $('contactName').addEventListener('input', function(e){ state.clientName = e.target.value; });
  $('copyBtn').addEventListener('click', doCopy);
  $('pdfBtn').addEventListener('click', doPDF);
  $('resetBtn').addEventListener('click', doReset);
}

/* ===========================================================================
   MOJE VYGENEROVANÉ DOKUMENTY (poradcovský pohľad — návrat k poznámkam
   zo stretnutia) — zdieľané loadHistoryList/logDocument/escapeHtml cez
   ../assets/advisor-panel.js, rovnaký vzor ako financna-medzera/wizard-poistenie.
   Žiadna nová databáza — len história vlastných vygenerovaných PDF poradcu.
=========================================================================== */
function loadMyDocuments(){
  loadHistoryList({
    endpoint: '../api/my-documents.php',
    tool: TOOL_NAME,
    cardId: 'myDocumentsCard',
    listId: 'myDocumentsList',
    rowHtml: function(row){
      const date = (row.generated_at || '').slice(0,10);
      return '<div class="item">'
        + '<div class="item-top">'
        + '<div class="item-body">'
          + '<div style="font-weight:700;">'+escapeHtml(row.client_label)+'</div>'
          + '<div style="font-size:12px;color:var(--muted);">'+date+'</div>'
        + '</div>'
        + '<button type="button" class="add-item" data-open-id="'+row.id+'">Otvoriť</button>'
        + '</div></div>';
    },
    onOpen: openHistoryRow,
  });
}

function openHistoryRow(row){
  if(!row || !row.form_data) return;
  Object.assign(state, JSON.parse(row.form_data));
  $('contactName').value = state.clientName;
  renderCategories();
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

/* ===========================================================================
   ŠTART
=========================================================================== */
(function init(){
  renderCategories(); bind(); render();
  loadMyDocuments();
  wireClientAutocomplete('tahak-co-pytat-od-klienta', 'contactName');
  autoOpenSavedDocument(function(d){ Object.assign(state, d); }, doPDF);
})();
</script>
