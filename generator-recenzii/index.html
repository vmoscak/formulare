<!DOCTYPE html>
<html lang="sk"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generátor 5-hviezdičkovej prosby</title>

<!-- =========================================================================
     GENERÁTOR 5-HVIEZDIČKOVEJ PROSBY — samostatný editovateľný súbor
     -------------------------------------------------------------------------
     Prosba o recenziu po uzatvorení zmluvy / vybavení škody / revízii a pod.
     Bez PDF — len text na kopírovanie alebo priamy odkaz (WhatsApp/SMS/e-mail).
     Odkaz na recenziu je predvyplnený fixnou hodnotou GOOGLE_REVIEW_LINK.

     Poznámka: texty a presné znenie sú zámerne len pracovná verzia — dizajn
     aj presné formulácie sa budú ešte dolaďovať.

     KDE ČO UPRAVIŤ:
       • Dôvody (kontext) ....... JS, objekt REASONS
       • Kanály ................. JS, objekt CHANNELS
       • Text správy ............ JS, funkcia buildMessage()
========================================================================== -->

<script src="../assets/theme-init.js"></script>
<link rel="stylesheet" href="../assets/ui.css?v=10">
</head>
<body>

<div class="app">
  <div class="head">
    <div class="head-left">
      <a href="../nastroje.php" class="back-btn" title="Späť na formuláre">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </a>
      <div class="brand">
        <div class="logo">R</div>
        <div>
          <b>Generátor 5-hviezdičkovej prosby</b><br>
          <small>Prosba o recenziu — WhatsApp, SMS alebo e-mail</small>
        </div>
      </div>
    </div>
    <div class="head-actions">
      <div class="avatar" id="avatar">?</div>
    </div>
  </div>

  <div class="body">
    <!-- ============ FORMULÁR ============ -->
    <div class="form">

      <div>
        <div class="step-head"><div class="step-num">1</div><div class="step-title">Klient/-ka</div></div>
        <div class="fields">
          <div class="field col-full" data-k="clientName">
            <label>MENO</label>
            <input id="clientName" placeholder="napr. Peter">
            <span class="err">Zadaj meno klienta</span>
          </div>
          <div class="field col-full" data-k="clientPhone">
            <label>TELEFÓN <span style="font-weight:500;text-transform:none;">(nepovinné — pre WhatsApp/SMS)</span></label>
            <input id="clientPhone" placeholder="+421 900 000 000">
            <span class="err"></span>
          </div>
          <div class="field col-full" data-k="clientEmail">
            <label>E-MAIL <span style="font-weight:500;text-transform:none;">(nepovinné — pre e-mailovú verziu)</span></label>
            <input id="clientEmail" placeholder="klient@example.com">
            <span class="err"></span>
          </div>
        </div>
      </div>

      <div>
        <div class="step-head"><div class="step-num">2</div><div class="step-title">Dôvod</div></div>
        <div class="grid3" id="reasons"></div>
      </div>

      <div>
        <div class="step-head"><div class="step-num">3</div><div class="step-title">Kanál</div></div>
        <div class="grid3" id="channels"></div>
      </div>

      <div>
        <div class="step-head"><div class="step-num">4</div><div class="step-title">Odkaz na recenziu</div></div>
        <div class="fields">
          <div class="field col-full" data-k="reviewLink">
            <label>ODKAZ NA GOOGLE RECENZIU <span style="font-weight:500;text-transform:none;">(predvyplnené, dá sa zmeniť napr. na Facebook)</span></label>
            <input id="reviewLink" placeholder="https://g.page/r/...">
            <span class="err">Zadaj odkaz na recenziu</span>
          </div>
        </div>
      </div>

      <div class="alert" id="summary" style="display:none;">
        <span class="bang">!</span>
        <span class="msg" id="summaryMsg"></span>
      </div>
    </div>

    <!-- ============ NÁHĽAD ============ -->
    <div class="preview">
      <div class="preview-head">
        <span class="t">Náhľad správy</span>
        <span class="live"><i></i>Aktualizuje sa naživo</span>
      </div>
      <div class="preview-tools">
        <button class="tool" id="copyBtn">Kopírovať text</button>
        <button class="tool" id="openBtn">Otvoriť WhatsApp</button>
      </div>
      <div class="letter-wrap">
        <div id="msgPreview" style="background:#fff; border-radius:8px; padding:20px; font-size:14px; line-height:1.7; white-space:pre-wrap; color:#20242b;"></div>
      </div>
    </div>
  </div>
</div>

<script src="../assets/advisor-panel.js"></script>
<script>
/* ===========================================================================
   DÁTA
=========================================================================== */
const REASONS = {
  zmluva:      { label:'Uzatvorenie zmluvy', sub:'Nová poistka/produkt', tile:'ZM', text:'za uzatvorenie novej zmluvy' },
  skoda:       { label:'Vybavenie škody', sub:'Poistná udalosť', tile:'ŠK', text:'za pomoc s vybavením poistnej udalosti' },
  konzultacia: { label:'Konzultácia', sub:'Poradenstvo', tile:'KO', text:'za konzultáciu a poradenstvo' },
  revizia:     { label:'Ročná revízia', sub:'Kontrola poistenia', tile:'RE', text:'za čas venovaný ročnej revízii poistenia' },
  vyrocie:     { label:'Výročie spolupráce', sub:'Dlhodobý klient', tile:'VY', text:'za dlhoročnú spoluprácu a dôveru' },
};

const CHANNELS = {
  whatsapp: { label:'WhatsApp', sub:'Rýchla správa s odkazom', tile:'WA' },
  sms:      { label:'SMS', sub:'Krátky text', tile:'SMS' },
  email:    { label:'E-mail', sub:'Formálnejšia správa', tile:'@' },
};

const GOOGLE_REVIEW_LINK = 'https://g.page/r/CSgYoZDlbPFzEBM/review';

const state = {
  clientName:'', clientPhone:'', clientEmail:'',
  reason:'zmluva', channel:'whatsapp',
  reviewLink: GOOGLE_REVIEW_LINK,
  advisorName:'',
  touched:false,
};

/* ===========================================================================
   VALIDÁCIA
=========================================================================== */
function validate(){
  const e = {};
  if(!state.clientName.trim()) e.clientName='Zadaj meno klienta';
  if(!state.reviewLink.trim()) e.reviewLink='Zadaj odkaz na recenziu';
  return e;
}

/* ===========================================================================
   VYKRESLENIE
=========================================================================== */
const $ = id => document.getElementById(id);

function renderReasons(){
  $('reasons').innerHTML = Object.keys(REASONS).map(function(k){
    const r=REASONS[k], sel=k===state.reason?' sel':'';
    return '<div class="type'+sel+'" data-reason="'+k+'">'
      + '<div class="tile">'+r.tile+'</div>'
      + '<div><div class="t-label">'+r.label+'</div><div class="t-sub">'+r.sub+'</div></div></div>';
  }).join('');
}

function renderChannels(){
  $('channels').innerHTML = Object.keys(CHANNELS).map(function(k){
    const c=CHANNELS[k], sel=k===state.channel?' sel':'';
    return '<div class="type'+sel+'" data-channel="'+k+'">'
      + '<div class="tile">'+c.tile+'</div>'
      + '<div><div class="t-label">'+c.label+'</div><div class="t-sub">'+c.sub+'</div></div></div>';
  }).join('');
}

function syncInputs(){
  ['clientName','clientPhone','clientEmail','reviewLink'].forEach(function(k){ if($(k)) $(k).value = state[k]; });
}

function buildSubject(){
  return 'Poprosím Vás o krátku recenziu';
}

function buildMessage(){
  const r = REASONS[state.reason];
  const name = state.clientName.trim();
  const link = state.reviewLink.trim() || '…';
  const sign = state.advisorName || '';

  if (state.channel === 'email') {
    return 'Dobrý deň' + (name ? ' ' + name : '') + ',\n\n'
      + 'ďakujem ' + r.text + '. Bol by som veľmi rád, keby ste si našli chvíľku a nechali krátku recenziu:\n\n'
      + link
      + '\n\nVopred ďakujem za váš čas.\n\n' + sign;
  }
  if (state.channel === 'sms') {
    return 'Ahoj' + (name ? ' ' + name : '') + ', ďakujem ' + r.text + '! Poprosím Ťa o krátku recenziu: ' + link + ' Vopred vďaka! ' + sign;
  }
  return 'Ahoj ' + (name || '') + (name ? ',' : '')
    + '\n\nĎakujem ' + r.text + '! Veľmi by mi pomohlo, keby si mi venoval/-a chvíľku a nechal/-a krátku recenziu:\n\n'
    + link
    + '\n\nVopred veľká vďaka! ⭐⭐⭐⭐⭐'
    + (sign ? '\n' + sign : '');
}

function buildPreviewText(){
  return state.channel === 'email' ? ('Predmet: ' + buildSubject() + '\n\n' + buildMessage()) : buildMessage();
}

function render(){
  const errors = validate();
  document.querySelectorAll('.field[data-k]').forEach(function(f){
    const k=f.dataset.k;
    const bad = state.touched && errors[k];
    f.classList.toggle('invalid', !!bad);
    const err=f.querySelector('.err'); if(err && errors[k]) err.textContent=errors[k];
  });
  const errCount = Object.keys(errors).length;
  $('summary').style.display = (state.touched && errCount>0) ? 'flex' : 'none';
  $('summaryMsg').textContent = 'Skontroluj zvýraznené polia ('+errCount+') a skús to znova.';

  var _p=(state.clientName||'').trim().split(/\s+/), _av=_p.length>=2?_p[0][0]+_p[_p.length-1][0]:(_p[0]?_p[0][0]:'?');
  $('avatar').textContent=_av.toUpperCase();

  $('msgPreview').textContent = buildPreviewText();

  var labels = { whatsapp:'Otvoriť WhatsApp', sms:'Otvoriť SMS', email:'Otvoriť e-mail' };
  $('openBtn').textContent = labels[state.channel];
}

/* ===========================================================================
   AKCIE
=========================================================================== */
function doCopy(){
  const txt = buildPreviewText();
  try{ if(navigator.clipboard) navigator.clipboard.writeText(txt); }catch(e){}
  const b=$('copyBtn'); b.textContent='Skopírované ✓'; setTimeout(function(){ b.textContent='Kopírovať text'; },1600);
  state.touched=true; render();
  logDocument('generator-recenzii', state.clientName||'Klient', state, undefined);
}

function doOpen(){
  state.touched=true; render();
  const errors=validate();
  if(Object.keys(errors).length>0) return;

  if (state.channel === 'email') {
    const to = (state.clientEmail||'').trim();
    const url = 'mailto:' + encodeURIComponent(to) + '?subject=' + encodeURIComponent(buildSubject()) + '&body=' + encodeURIComponent(buildMessage());
    window.location.href = url;
  } else if (state.channel === 'sms') {
    const phone = (state.clientPhone||'').replace(/[^\d+]/g,'');
    const url = 'sms:' + phone + '?body=' + encodeURIComponent(buildMessage());
    window.location.href = url;
  } else {
    const phone = (state.clientPhone||'').replace(/[^\d+]/g,'').replace(/^00/,'+').replace(/^\+?/, '');
    const txt = encodeURIComponent(buildMessage());
    const url = phone ? 'https://wa.me/' + phone + '?text=' + txt : 'https://wa.me/?text=' + txt;
    window.open(url, '_blank');
  }
  logDocument('generator-recenzii', state.clientName||'Klient', state, undefined);
}

/* ===========================================================================
   UDALOSTI
=========================================================================== */
function bind(){
  document.addEventListener('click', function(e){
    const r=e.target.closest('[data-reason]'); if(r){ state.reason=r.dataset.reason; renderReasons(); render(); return; }
    const c=e.target.closest('[data-channel]'); if(c){ state.channel=c.dataset.channel; renderChannels(); render(); return; }
  });
  document.addEventListener('input', function(e){
    ['clientName','clientPhone','clientEmail','reviewLink'].forEach(function(k){
      if(e.target.id===k){ state[k]=e.target.value; render(); }
    });
  });
  $('copyBtn').addEventListener('click', doCopy);
  $('openBtn').addEventListener('click', doOpen);
}

/* ===========================================================================
   ŠTART
=========================================================================== */
(function init(){
  renderReasons(); renderChannels(); syncInputs(); bind(); render();
  fetch('/api/whoami.php', { credentials:'same-origin' })
    .then(function(r){ return r.ok ? r.json() : {}; })
    .then(function(adv){ if(adv && adv.id){ state.advisorName = adv.name || ''; render(); } })
    .catch(function(){});
})();
</script>

<script src="/assets/shell.js?v=18"></script>
</body></html>
