name: Deploy na Websupport

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inštalácia lftp
        run: sudo apt-get update -y && sudo apt-get install -y lftp

      - name: Deploy Formuláre (lftp mirror, vytvára vnorené priečinky)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
          set sftp:auto-confirm yes;
          set net:max-retries 2;
          set net:timeout 20;
          open -u '$FTP_USERNAME','$FTP_PASSWORD' sftp://$FTP_SERVER:22;
          mirror -R --verbose --parallel=3 \
            --exclude ^\.git/ \
            --exclude ^\.github/ \
            ./ /sub/formulare/;
          "
