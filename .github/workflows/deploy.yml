name: Deploy na Websupport

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inštalácia lftp
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update -y
          sudo apt-get install -y lftp

      - name: PHP pre generovanie config.local.php
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Syntax check všetkých .php súborov (zastaví deploy pri chybe)
        run: |
          find . -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 -P4 php -l

      - name: Smoke test (SQLite, kľúčové stránky bez fatal chyby)
        run: |
          php -r '
            $out = "<?php\n";
            $out .= "define(\"DB_DSN\", \"sqlite:\" . __DIR__ . \"/tmp/ci-test.sqlite\");\n";
            $out .= "define(\"DB_USER\", \"\");\ndefine(\"DB_PASS\", \"\");\n";
            $out .= "define(\"GATE_TOKEN\", \"ci-test-token\");\n";
            $out .= "define(\"GATE_PASSPHRASE\", \"0000\");\n";
            $out .= "define(\"LOCATIONIQ_TOKEN\", \"\");\n";
            file_put_contents("config.local.php", $out);
          '
          mkdir -p tmp
          php -S 127.0.0.1:8899 >/tmp/php-smoke.log 2>&1 &
          sleep 2
          php -r '
            require "config.local.php"; require "db.php";
            dbInitSqlite(db());
            $pdo = db();
            $pdo->exec("DELETE FROM formulare_advisors");
            $pdo->prepare("INSERT INTO formulare_advisors (id, name, email, is_owner, is_admin) VALUES (1, ?, ?, 1, 1)")
                ->execute(["CI Owner", "ci@test.local"]);
            file_put_contents("/tmp/ci-cookie.txt", signAdvisorId(1));
          '
          COOKIE="gate_auth=ci-test-token; cur_advisor=$(cat /tmp/ci-cookie.txt)"
          PAGES="uvod.php admin.php nabor.php nabor-kandidati.php tim-kalendar.php tim-prehlad.php moje-dokumenty.php novinky.php znalostna-baza.php cesta-novacika.php copy-paste.php refinancny-radar.php oplati-sa-refinancovat.php nastroje.php formulare.php pomocky.php uniqa-tlaciva.php index.php"
          FAIL=0
          for page in $PAGES; do
            CODE=$(curl -s -o /tmp/resp.html -w "%{http_code}" -b "$COOKIE" "http://127.0.0.1:8899/$page")
            FATAL=$(grep -c "Fatal error\|Cannot redeclare\|Parse error" /tmp/resp.html || true)
            if [ "$FATAL" != "0" ] || { [ "$CODE" != "200" ] && [ "$CODE" != "302" ]; }; then
              echo "FAIL: $page -> HTTP $CODE, fatal riadkov=$FATAL"
              cat /tmp/resp.html
              FAIL=1
            else
              echo "OK: $page -> HTTP $CODE"
            fi
          done
          kill %1 2>/dev/null || true
          rm -f config.local.php tmp/ci-test.sqlite
          if [ "$FAIL" = "1" ]; then exit 1; fi

      - name: Vygenerovanie config.local.php a doplnenie GATE_TOKEN do .htaccess
        env:
          DB_DSN: ${{ secrets.DB_DSN }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          GATE_TOKEN: ${{ secrets.GATE_TOKEN }}
          GATE_PASSPHRASE: ${{ secrets.GATE_PASSPHRASE }}
          LOCATIONIQ_TOKEN: ${{ secrets.LOCATIONIQ_TOKEN }}
        run: |
          php -r '
            $vars = ["DB_DSN","DB_USER","DB_PASS","GATE_TOKEN","GATE_PASSPHRASE","LOCATIONIQ_TOKEN"];
            $out = "<?php\n";
            foreach ($vars as $v) { $out .= "define(".var_export($v,true).", ".var_export(getenv($v),true).");\n"; }
            file_put_contents("config.local.php", $out);
          '
          php -r '
            $h = file_get_contents(".htaccess");
            file_put_contents(".htaccess", str_replace("__GATE_TOKEN__", getenv("GATE_TOKEN"), $h));
          '

      - name: Deploy Portál (lftp mirror, vytvára vnorené priečinky)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
          set sftp:auto-confirm yes;
          set net:max-retries 2;
          set net:timeout 20;
          open -u '$FTP_USERNAME','$FTP_PASSWORD' sftp://$FTP_SERVER:22;
          mirror -R --verbose --parallel=3 --delete \
            --exclude ^\.git/ \
            --exclude ^\.github/ \
            --exclude ^tmp/ \
            --exclude ^data/ \
            --exclude \.mtx\.php$ \
            --exclude \.cw\.dat$ \
            --exclude \.cw127\.php$ \
            ./ /sub/portal/;
          "
