name: Deploy na Websupport

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inštalácia lftp
        run: sudo apt-get update -y && sudo apt-get install -y lftp

      - name: PHP pre generovanie config.local.php
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Vygenerovanie config.local.php a doplnenie GATE_TOKEN do .htaccess
        env:
          DB_DSN: ${{ secrets.DB_DSN }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          GATE_TOKEN: ${{ secrets.GATE_TOKEN }}
          GATE_PASSPHRASE: ${{ secrets.GATE_PASSPHRASE }}
        run: |
          php -r '
            $vars = ["DB_DSN","DB_USER","DB_PASS","GATE_TOKEN","GATE_PASSPHRASE"];
            $out = "<?php\n";
            foreach ($vars as $v) { $out .= "define(".var_export($v,true).", ".var_export(getenv($v),true).");\n"; }
            file_put_contents("config.local.php", $out);
          '
          php -r '
            $h = file_get_contents(".htaccess");
            file_put_contents(".htaccess", str_replace("__GATE_TOKEN__", getenv("GATE_TOKEN"), $h));
          '

      - name: Deploy Formuláre (lftp mirror, vytvára vnorené priečinky)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
          set sftp:auto-confirm yes;
          set net:max-retries 2;
          set net:timeout 20;
          open -u '$FTP_USERNAME','$FTP_PASSWORD' sftp://$FTP_SERVER:22;
          mirror -R --verbose --parallel=3 \
            --exclude ^\.git/ \
            --exclude ^\.github/ \
            ./ /sub/formulare/;
          "
