<!DOCTYPE html>
<html lang="sk"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kartička „Odporučte ma priateľom“</title>

<!-- =========================================================================
     KARTIČKA „ODPORUČTE MA PRIATEĽOM“ — samostatný editovateľný súbor
     -------------------------------------------------------------------------
     Krátka poďakovacia kartička s kontaktom na poradcu, ktorú klient môže
     odovzdať priateľovi/rodine, ktorý potrebuje pomôcť s poistením/financiami.
     PDF cez zdieľaný ../pdf.php (Dompdf) + kratšia SMS/WhatsApp textová verzia.

     Poznámka: text aj dizajn sú zámerne len pracovná verzia — doladíme neskôr.

     KDE ČO UPRAVIŤ:
       • Farby / vzhľad ........ zdieľaný dizajnový systém ../assets/ui.css
       • Text kartičky .......... JS, funkcia buildLetterHtml()
========================================================================== -->

<script src="../assets/theme-init.js"></script>
<script src="../assets/toast.js?v=1"></script>
<link rel="stylesheet" href="../assets/ui.css?v=8">
</head>
<body>

<div class="app">
  <div class="head">
    <div class="head-left">
      <a href="../nastroje.php" class="back-btn" title="Späť na formuláre">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </a>
      <div class="brand">
        <div class="logo">O</div>
        <div>
          <b>Kartička „Odporučte ma priateľom“</b><br>
          <small>Poďakovanie a kontakt pre klienta, na odovzdanie ďalej</small>
        </div>
      </div>
    </div>
    <div class="head-actions">
      <div class="avatar" id="avatar">?</div>
    </div>
  </div>

  <div class="body">
    <!-- ============ FORMULÁR ============ -->
    <div class="form">

      <!-- 1. klient -->
      <div>
        <div class="step-head"><div class="step-num">1</div><div class="step-title">Klient/-ka <span style="font-weight:500;text-transform:none;font-size:12px;color:var(--muted);">(nepovinné, pre oslovenie na kartičke)</span></div></div>
        <div class="fields">
          <div class="field col-full" data-k="clientName">
            <label>MENO A PRIEZVISKO</label>
            <input id="clientName" placeholder="Meno a priezvisko">
            <span class="err"></span>
          </div>
        </div>
      </div>

      <!-- 2. poradca -->
      <div>
        <div class="step-head"><div class="step-num">2</div><div class="step-title">Tvoj kontakt (poradca/-kyňa)</div></div>
        <div class="fields">
          <div class="field col-full" data-k="advisorName">
            <label>MENO A PRIEZVISKO</label>
            <input id="advisorName" placeholder="Meno a priezvisko">
            <span class="err">Zadaj meno a priezvisko</span>
          </div>
          <div class="field" data-k="advisorPhone">
            <label>TELEFÓN</label>
            <input id="advisorPhone" placeholder="+421 900 000 000">
            <span class="err">Zadaj telefón</span>
          </div>
          <div class="field" data-k="advisorEmail">
            <label>E-MAIL <span style="font-weight:500;text-transform:none;">(nepovinné)</span></label>
            <input id="advisorEmail" placeholder="meno@vmfin.sk">
            <span class="err"></span>
          </div>
        </div>
      </div>

      <div class="alert" id="summary" style="display:none;">
        <span class="bang">!</span>
        <span class="msg" id="summaryMsg"></span>
      </div>

      <div class="actions">
        <button class="btn-primary" id="genBtn">Vygenerovať a stiahnuť PDF</button>
        <button class="btn-ghost" id="resetBtn">Vyčistiť</button>
      </div>
    </div>

    <!-- ============ NÁHĽAD ============ -->
    <div class="preview">
      <div class="preview-head">
        <span class="t">Náhľad kartičky</span>
        <span class="live"><i></i>Aktualizuje sa naživo</span>
      </div>
      <div class="preview-tools">
        <button class="tool" id="copyBtn">Kopírovať ako SMS/WhatsApp text</button>
      </div>
      <div class="letter-wrap">
        <iframe id="letterFrame" class="letter-frame" title="Náhľad kartičky"></iframe>
      </div>
    </div>
  </div>
</div>

<script src="../assets/advisor-panel.js"></script>
<script>
/* ===========================================================================
   DÁTA
=========================================================================== */
const state = {
  clientName:'',
  advisorName:'', advisorPhone:'', advisorEmail:'',
  touched:false,
};

/* ===========================================================================
   VALIDÁCIA
=========================================================================== */
function validate(){
  const e = {};
  if(!state.advisorName.trim()) e.advisorName='Zadaj meno a priezvisko';
  if(!state.advisorPhone.trim()) e.advisorPhone='Zadaj telefón';
  return e;
}

/* ===========================================================================
   VYKRESLENIE
=========================================================================== */
const $ = id => document.getElementById(id);

function syncInputs(){
  ['clientName','advisorName','advisorPhone','advisorEmail'].forEach(function(k){
    if($(k)) $(k).value = state[k];
  });
}

let _previewTimer=null;
function refreshPreview(){
  if(_previewTimer) clearTimeout(_previewTimer);
  _previewTimer=setTimeout(function(){
    var frame=document.getElementById('letterFrame');
    if(!frame) return;
    frame.onload=function(){
      try{
        var doc=frame.contentDocument;
        var scale=frame.clientWidth/794;
        doc.body.style.transform='scale('+scale+')';
        var contentH=doc.body.scrollHeight;
        frame.style.height=Math.ceil(contentH*scale)+'px';
      }catch(e){}
    };
    frame.srcdoc=buildLetterHtml(true);
  }, 180);
}

function render(){
  const errors = validate();
  document.querySelectorAll('.field[data-k]').forEach(function(f){
    const k=f.dataset.k;
    const bad = state.touched && errors[k];
    f.classList.toggle('invalid', !!bad);
    const err=f.querySelector('.err'); if(err && errors[k]) err.textContent=errors[k];
  });
  const errCount = Object.keys(errors).length;
  $('summary').style.display = (state.touched && errCount>0) ? 'flex' : 'none';
  $('summaryMsg').textContent = 'Skontroluj zvýraznené polia ('+errCount+') a skús to znova.';

  var _p=(state.advisorName||'').trim().split(/\s+/), _av=_p.length>=2?_p[0][0]+_p[_p.length-1][0]:(_p[0]?_p[0][0]:'?');
  $('avatar').textContent=_av.toUpperCase();
  refreshPreview();
}

function escapeHtml(x){ return String(x==null?'':x).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ===========================================================================
   AKCIE — PDF (server), kopírovanie, reset
=========================================================================== */
function buildLetterHtml(previewMode){
  const body = `
    <div class="pdf-topbar"></div><div class="doctitle">Odporučte ma priateľom</div>
    <div class="card-sub">${state.clientName ? 'Ďakujem, ' + escapeHtml(state.clientName) : 'Ďakujem za dôveru'}</div>

    <div class="section">
      <div class="section-title">Prečo túto kartičku dostávate</div>
      <p>Najviac si vážim odporúčania od spokojných klientov. Ak poznáte niekoho —
      rodinu, priateľa či kolegu — komu by som mohol/-la pomôcť s poistením alebo
      financiami, odovzdajte mu, prosím, tento kontakt alebo túto kartičku.</p>
    </div>

    <div class="section">
      <div class="section-title">Kontakt</div>
      <p>${escapeHtml(state.advisorName||'…')} · ${escapeHtml(state.advisorPhone||'…')}${state.advisorEmail ? ' · ' + escapeHtml(state.advisorEmail) : ''}</p>
    </div>

    <div class="section">
      <div class="section-title">Priestor na odporúčanie</div>
      <table class="ref-table">
        <tr><td class="ref-label">Meno:</td><td class="ref-line"></td></tr>
        <tr><td class="ref-label">Telefón:</td><td class="ref-line"></td></tr>
      </table>
    </div>

    <div class="footer-bar">
      <table><tr>
        <td class="fl">${escapeHtml(state.clientName||'…')}</td>
        <td class="fr">Odporučte ma priateľom</td>
      </tr></table>
    </div>`;

  const css = `
    div,p,table,tr,td,th,strong,span,ul,ol,li { box-sizing:border-box; margin:0; padding:0; }
    body { margin:0; padding:0; font-family:'DejaVu Sans',sans-serif; font-size:11pt; line-height:1.6; color:#20242b; background:#fff; }
    .pdf-topbar { height:3mm; background:#059669; border-radius:0.8mm; margin-bottom:6mm; } .doctitle { text-align:center; font-size:16pt; letter-spacing:1pt; text-transform:uppercase; font-weight:bold;
      padding:7pt 0 2pt; }
    .card-sub { text-align:center; font-size:12pt; color:#555; margin-bottom:8mm; padding-bottom:5mm; border-bottom:1pt solid #20242b; }
    .section { margin-bottom:7mm; }
    .section-title { font-size:10pt; font-weight:bold; text-transform:uppercase; letter-spacing:0.5pt; color:#4f46e5; margin-bottom:2.5mm; }
    .ref-table { width:100%; border-collapse:collapse; font-size:10.5pt; margin-top:2mm; }
    .ref-table td { padding:4mm 0; }
    .ref-table td.ref-label { width:25mm; color:#555; }
    .ref-table td.ref-line { border-bottom:0.75pt solid #999; }
    .footer-bar table { width:100%; border-collapse:collapse; }
    .footer-bar td.fr { text-align:right; }
    .footer-bar { position:fixed; bottom:-22mm; left:0; right:0; width:166mm; border-top:0.5pt solid #ccc; padding-top:4pt; font-size:8.5pt; color:#999; }
    @page{ margin:24mm 22mm 32mm 22mm; }
  `;

  const previewFonts = `
    @font-face { font-family:'DejaVu Sans'; src:url('../vendor/dompdf/lib/fonts/DejaVuSans.ttf'); }
    @font-face { font-family:'DejaVu Sans'; font-weight:bold; src:url('../vendor/dompdf/lib/fonts/DejaVuSans-Bold.ttf'); }
  `;
  let finalCss = css;
  if(previewMode) finalCss = previewFonts + css + ' html{ overflow:hidden; background:#fff; } body{ box-sizing:border-box; width:210mm; padding:24mm 22mm 32mm 22mm; background:#fff; transform-origin:top left; } .footer-bar{ position:static; margin-top:20mm; width:auto; }';

  return '<!DOCTYPE html><html lang="sk"><head>'
    +'<meta http-equiv="Content-Type" content="text/html; charset=utf-8">'
    +'<title>Odporučte ma priateľom</title>'
    +'<style>'+finalCss+'</style></head><body>'+body+'</body></html>';
}

function doPDF(){
  state.touched=true; render();
  const errors=validate();
  if(Object.keys(errors).length>0) return;

  const btn=$('genBtn');
  btn.textContent='Generujem…'; btn.disabled=true;

  const letterHtml=buildLetterHtml();
  const filename='Odporucte_ma_priatelom_'+(state.clientName||'klient').replace(/\s+/g,'_');

  fetch('../pdf.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ html: letterHtml, filename: filename })
  })
  .then(function(r){
    const ct = r.headers.get('Content-Type') || '';
    if (ct.includes('application/json') || ct.includes('text/')) {
      return r.text().then(function(t){ throw new Error('Server: ' + t); });
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.blob();
  })
  .then(function(blob){
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=filename+'.pdf';
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
    btn.textContent='Vygenerovať a stiahnuť PDF'; btn.disabled=false;
    logDocument('karticka-odporucte-ma', state.clientName||'Klient', state, undefined);
  })
  .catch(function(e){
    console.error(e);
    btn.textContent='Vygenerovať a stiahnuť PDF'; btn.disabled=false;
    showToast('Chyba PDF: ' + e.message, 'error');
  });
}

function doCopy(){
  const txt=['ODPORUČTE MA PRIATEĽOM', state.clientName ? 'Ďakujem, ' + state.clientName : 'Ďakujem za dôveru', '',
    'Najviac si vážim odporúčania od spokojných klientov. Ak poznáte niekoho, komu by som mohol/-la pomôcť s poistením alebo financiami, dajte mu, prosím, tento kontakt:', '',
    (state.advisorName||'…') + ' · ' + (state.advisorPhone||'…') + (state.advisorEmail ? ' · ' + state.advisorEmail : '')]
    .join('\n');
  try{ if(navigator.clipboard) navigator.clipboard.writeText(txt); }catch(e){}
  const b=$('copyBtn'); b.textContent='Skopírované ✓'; setTimeout(function(){ b.textContent='Kopírovať ako SMS/WhatsApp text'; },1600);
  logDocument('karticka-odporucte-ma', state.clientName||'Klient', state, undefined);
}

function doReset(){
  Object.assign(state,{
    clientName:'',
    advisorName: state.advisorName, advisorPhone: state.advisorPhone, advisorEmail: state.advisorEmail,
    touched:false,
  });
  syncInputs(); render();
}

/* ===========================================================================
   UDALOSTI
=========================================================================== */
function bind(){
  document.addEventListener('input', function(e){
    ['clientName','advisorName','advisorPhone','advisorEmail'].forEach(function(k){
      if(e.target.id===k){ state[k]=e.target.value; render(); }
    });
  });

  $('genBtn').addEventListener('click', doPDF);
  $('copyBtn').addEventListener('click', doCopy);
  $('resetBtn').addEventListener('click', doReset);
}

/* ===========================================================================
   ŠTART — predvyplní poradcu z prihláseného účtu (whoami)
=========================================================================== */
(function init(){
  bind(); render();
  fetch('/api/whoami.php', { credentials:'same-origin' })
    .then(function(r){ return r.ok ? r.json() : {}; })
    .then(function(adv){
      if(adv && adv.id){
        state.advisorName = adv.name || '';
        state.advisorPhone = adv.phone || '';
        state.advisorEmail = adv.email || '';
        syncInputs(); render();
      }
    })
    .catch(function(){});
  autoOpenSavedDocument(function(d){ Object.assign(state, d); state.touched = true; syncInputs(); render(); }, doPDF);
})();
</script>

<script src="/assets/shell.js?v=14"></script>
</body></html>
