<!DOCTYPE html>
<html lang="sk"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prvých 30 dní</title>

<!-- =========================================================================
     PRVÝCH 30 DNÍ — samostatný editovateľný súbor
     -------------------------------------------------------------------------
     Kartička pre klienta hneď po podpise: čo teraz nasleduje, kedy začína
     platiť krytie, ako postupovať pri poistnej udalosti. Znižuje popodpisovú
     neistotu. Vyber produkt, voliteľné meno klienta, PDF cez zdieľaný
     ../pdf.php (Dompdf) aj text na SMS/WhatsApp. Kontakt poradcu sa
     predvyplní z prihláseného účtu (whoami).

     KDE ČO UPRAVIŤ:
       • Produkty a kroky ...... JS, objekt PRODUCTS
       • Kontakt poradcu ....... JS, objekt ADVISOR (prepíše sa automaticky)
       • Farby / vzhľad ........ zdieľaný dizajnový systém ../assets/ui.css
========================================================================== -->

<script src="../assets/theme-init.js"></script>
<script src="../assets/toast.js?v=1"></script>
<link rel="stylesheet" href="../assets/ui.css?v=8">
</head>
<body>

<div class="app">
  <div class="head">
    <div class="head-left">
      <a href="../nastroje.php" class="back-btn" title="Späť na formuláre">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </a>
      <div class="brand">
        <div class="logo">30</div>
        <div>
          <b>Prvých 30 dní</b><br>
          <small>Čo nasleduje po podpise zmluvy</small>
        </div>
      </div>
    </div>
    <div class="head-actions">
      <div class="avatar" id="avatar">30</div>
    </div>
  </div>

  <div class="body">
    <!-- ============ VÝBER ============ -->
    <div class="form">
      <div>
        <div class="step-head"><div class="step-num">1</div><div class="step-title">Aký produkt práve podpísal klient?</div></div>
        <div class="grid3" id="products"></div>
      </div>

      <div>
        <div class="step-head"><div class="step-num">2</div><div class="step-title">Klient <span style="font-weight:500;text-transform:none;font-size:12px;color:var(--muted);">(nepovinné, pre oslovenie a PDF)</span></div></div>
        <div class="fields">
          <div class="field col-full" data-k="clientName">
            <label>MENO</label>
            <input id="clientName" placeholder="napr. Ján Novák">
          </div>
        </div>
      </div>
    </div>

    <!-- ============ ČASOVÁ OS ============ -->
    <div class="preview">
      <div class="preview-head">
        <span class="t">Čo teraz nasleduje</span>
        <span class="live"><i></i>Odškrtávaj, čo si klientovi vysvetlil/-a</span>
      </div>
      <div class="preview-tools">
        <button class="tool" id="copyBtn">Kopírovať text (SMS/WhatsApp)</button>
        <button class="tool" id="pdfBtn">Stiahnuť PDF</button>
        <button class="tool" id="resetBtn">Vynulovať odškrtnuté</button>
      </div>
      <div class="letter-wrap">
        <div id="stepsBody" style="background:#fff; border-radius:8px; padding:24px;"></div>
      </div>
    </div>
  </div>
</div>

<script src="../assets/advisor-panel.js"></script>
<script>
/* ===========================================================================
   KONTAKT NA PORADCU (mailto/telefón fallback, prepíše sa z whoami)
=========================================================================== */
const ADVISOR = { name: 'Vladimír Moščák', email: 'vmfin@vmfin.sk', phone: '+421 910 491 768' };

/* ===========================================================================
   DÁTA — tu meníš produkty a kroky časovej osi
=========================================================================== */
const PRODUCTS = {
  zivotne: {
    label: 'Životné poistenie', tile: 'Ž',
    steps: [
      { when: 'Ihneď', text: 'Poistenie začína platiť od dohodnutého dátumu v zmluve (zvyčajne od 1. dňa nasledujúceho mesiaca, pokiaľ nie je dohodnuté inak).' },
      { when: 'Do cca 2 týždňov', text: 'Zmluvná dokumentácia a poistné podmienky prídu poštou alebo e-mailom — odporúčam uložiť aj digitálne, na bezpečné miesto.' },
      { when: 'Priebežne', text: 'Skontrolujte si nastavenú platbu poistného (trvalý príkaz/inkaso) podľa dohodnutej frekvencie.' },
      { when: 'Pri poistnej udalosti', text: 'Ozvite sa mi ako prvému — pomôžem s nahlásením a potrebnými dokladmi, aby sa nič nezdržalo.' },
    ],
  },
  majetok: {
    label: 'Poistenie majetku', tile: 'M',
    steps: [
      { when: 'Ihneď', text: 'Poistenie nehnuteľnosti/domácnosti platí od dohodnutého dátumu uvedeného v zmluve.' },
      { when: 'Do cca 2 týždňov', text: 'Zmluva a poistné podmienky prídu poštou alebo e-mailom — uložte si aj dohodnutú poistnú sumu.' },
      { when: 'Odporúčanie', text: 'Odfoťte si cennejšie vybavenie domácnosti (elektronika, šperky) — uľahčí to prípadnú likvidáciu škody.' },
      { when: 'Pri škode', text: 'Nahláste škodu čo najskôr, ideálne cez mňa — poradím, aké doklady a fotky budete potrebovať.' },
    ],
  },
  auto: {
    label: 'PZP a havarijné', tile: 'A',
    steps: [
      { when: 'Ihneď', text: 'Poistenie vozidla platí od dohodnutého dátumu — potvrdenie o poistení by ste mali mať pri sebe v aute.' },
      { when: 'Do cca 2 týždňov', text: 'Zelená karta a zmluvná dokumentácia príde poštou alebo e-mailom.' },
      { when: 'Odporúčanie', text: 'Uložte si moje číslo priamo do telefónu pod „Poistenie auto“ — pri nehode sa oplatí mať ho poruke hneď.' },
      { when: 'Pri nehode/škode', text: 'Zavolajte mi čo najskôr, poviem vám presne, čo fotiť a ako postupovať.' },
    ],
  },
  hypoteka: {
    label: 'Hypotéka', tile: 'H',
    steps: [
      { when: 'Ihneď', text: 'Po podpise úverovej zmluvy banka pripraví čerpanie úveru podľa dohodnutých podmienok.' },
      { when: 'Do niekoľkých týždňov', text: 'Sledujte, či banka nepotrebuje doplniť dokumenty k čerpaniu (znalecký posudok, poistenie nehnuteľnosti a pod.).' },
      { when: 'Priebežne', text: 'Sledujem dátum konca vašej fixácie a pripomeniem vám ho vopred, aby sme mohli včas porovnať ponuky.' },
      { when: 'Kedykoľvek', text: 'Pri akejkoľvek zmene (príjem, plány na predaj/refinancovanie) mi napíšte, poradíme sa spolu.' },
    ],
  },
  investicie: {
    label: 'Investície / III. pilier', tile: 'I',
    steps: [
      { when: 'Ihneď', text: 'Zmluva alebo účet sa zriaďuje podľa dohodnutých podmienok, prvý vklad prebehne podľa zvoleného spôsobu platby.' },
      { when: 'Do cca 2 týždňov', text: 'Prístupové údaje do klientskej zóny (ak je k dispozícii) prídu e-mailom — odporúčam si ich hneď uložiť.' },
      { when: 'Odporúčanie', text: 'Nekontrolujte hodnotu investície denne — ide o dlhodobý horizont, krátkodobé výkyvy sú bežné.' },
      { when: 'Kedykoľvek', text: 'Pri zmene životnej situácie (zmena príjmu, cieľov) sa ozvite, prehodnotíme nastavenie spolu.' },
    ],
  },
};

const state = { product: 'zivotne', checked: {}, clientName: '' };

const $ = id => document.getElementById(id);
function escapeHtml(x){ return String(x==null?'':x).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ===========================================================================
   VYKRESLENIE
=========================================================================== */
function renderProducts(){
  $('products').innerHTML = Object.keys(PRODUCTS).map(function(k){
    const p = PRODUCTS[k], sel = k === state.product ? ' sel' : '';
    return '<div class="type' + sel + '" data-product="' + k + '">'
      + '<div class="tile">' + p.tile + '</div>'
      + '<div><div class="t-label">' + escapeHtml(p.label) + '</div></div></div>';
  }).join('');
}

function renderSteps(){
  const prod = PRODUCTS[state.product];
  const checkedSet = state.checked[state.product] || {};
  $('avatar').textContent = prod.tile;
  $('stepsBody').innerHTML = '<div style="font-weight:700; font-size:15px; color:#20242b; margin-bottom:4px;">' + escapeHtml(prod.label) + '</div>'
    + '<p style="font-size:12.5px; color:#8a8f99; margin-bottom:14px;">Prehľad pre ' + (state.clientName.trim() ? escapeHtml(state.clientName.trim()) : 'klienta') + '</p>'
    + prod.steps.map(function(s, i){
        const isChecked = !!checkedSet[i];
        return '<label style="display:flex; align-items:flex-start; gap:10px; padding:9px 0; border-bottom:1px solid #eef0f3; cursor:pointer;">'
          + '<input type="checkbox" data-q="' + i + '" ' + (isChecked ? 'checked' : '') + ' style="margin-top:3px; flex-shrink:0; width:16px; height:16px;">'
          + '<span style="font-size:13.5px; line-height:1.6; color:' + (isChecked ? '#9aa1ad' : '#20242b') + '; text-decoration:' + (isChecked ? 'line-through' : 'none') + ';">'
            + '<b style="font-weight:700;">' + escapeHtml(s.when) + ':</b> ' + escapeHtml(s.text)
          + '</span></label>';
      }).join('');
}

function render(){ renderProducts(); renderSteps(); }

/* ===========================================================================
   AKCIE
=========================================================================== */
function doCopy(){
  const prod = PRODUCTS[state.product];
  const greeting = state.clientName.trim() ? 'Dobrý deň, ' + state.clientName.trim() + ',' : 'Dobrý deň,';
  const txt = greeting + ' posielam prehľad, čo teraz nasleduje po podpise (' + prod.label + '):\n\n'
    + prod.steps.map(function(s){ return '• ' + s.when + ': ' + s.text; }).join('\n')
    + '\n\nS pozdravom, ' + (ADVISOR.name || '') + (ADVISOR.phone ? ' (' + ADVISOR.phone + ')' : '');
  try{ if(navigator.clipboard) navigator.clipboard.writeText(txt); }catch(e){}
  const b = $('copyBtn'); const orig = b.textContent;
  b.textContent = 'Skopírované ✓'; setTimeout(function(){ b.textContent = orig; }, 1600);
}

function doReset(){
  state.checked[state.product] = {};
  renderSteps();
}

/* ===========================================================================
   PDF PRE KLIENTA (server-side Dompdf cez zdieľaný ../pdf.php, presné A4)
=========================================================================== */
function buildLetterHtml(){
  const prod = PRODUCTS[state.product];
  const clientName = state.clientName.trim() || 'Klient';
  const today = new Date();
  const SK_MONTHS = ['január','február','marec','apríl','máj','jún','júl','august','september','október','november','december'];
  const dateStr = today.getDate() + '. ' + SK_MONTHS[today.getMonth()] + ' ' + today.getFullYear();

  const rows = prod.steps.map(function(s){
    return '<div class="ps-item"><div class="ps-when">' + escapeHtml(s.when) + '</div><div class="ps-text">' + escapeHtml(s.text) + '</div></div>';
  }).join('');

  const css = `
    @font-face { font-family:'DejaVu Sans'; src:url('../vendor/dompdf/lib/fonts/DejaVuSans.ttf'); }
    @font-face { font-family:'DejaVu Sans'; font-weight:bold; src:url('../vendor/dompdf/lib/fonts/DejaVuSans-Bold.ttf'); }
    * { box-sizing:border-box; }
    div,p,span { margin:0; padding:0; }
    body { margin:0; padding:0; font-family:'DejaVu Sans',sans-serif; font-size:10.5pt; line-height:1.5; color:#20242b; background:#fff; }
    .pdf-topbar { height:3mm; background:#059669; border-radius:0.8mm; margin-bottom:6mm; } .doctitle { text-align:center; font-size:16pt; letter-spacing:.5pt; font-weight:bold; padding:7pt 0 2pt; }
    .card-sub { text-align:center; font-size:10.5pt; color:#666; margin-bottom:5mm; }
    .meta { text-align:center; font-size:9pt; color:#8a8a8a; margin-bottom:9mm; padding-bottom:5mm; border-bottom:1pt solid #e5e5e5; }
    .ps-hd { color:#fff; background:#059669; font-weight:bold; font-size:12pt; padding:3mm 4mm; border-radius:2mm; margin-bottom:5mm; }
    .ps-item { display:flex; gap:5mm; padding:3mm 0; border-bottom:0.5pt solid #eef0f3; }
    .ps-when { flex-shrink:0; width:34mm; font-weight:bold; font-size:9.5pt; color:#059669; }
    .ps-text { font-size:10pt; }
    .contact { margin-top:7mm; padding:4mm 5mm; background:#ecfdf5; border-radius:2mm; font-size:9.5pt; }
    @page{ margin:20mm 20mm 20mm 20mm; }
  `;

  return '<!DOCTYPE html><html lang="sk"><head>'
    + '<meta http-equiv="Content-Type" content="text/html; charset=utf-8">'
    + '<title>Prvých 30 dní</title><style>' + css + '</style></head><body>'
    + '<div class="pdf-topbar"></div><div class="doctitle">Prvých 30 dní</div>'
    + '<div class="card-sub">Čo teraz nasleduje po podpise</div>'
    + '<div class="meta">' + escapeHtml(clientName) + ' &middot; ' + dateStr + '</div>'
    + '<div class="ps-hd">' + escapeHtml(prod.label) + '</div>'
    + rows
    + '<div class="contact">Otázky kedykoľvek: <b>' + escapeHtml(ADVISOR.name || '') + '</b>'
      + (ADVISOR.phone ? ' &middot; ' + escapeHtml(ADVISOR.phone) : '')
      + (ADVISOR.email ? ' &middot; ' + escapeHtml(ADVISOR.email) : '') + '</div>'
    + '</body></html>';
}

function doPDF(){
  const btn = $('pdfBtn'); const orig = btn.textContent;
  btn.textContent = 'Generujem…'; btn.disabled = true;

  const html = buildLetterHtml();
  const filename = 'Prvych_30_dni' + (state.clientName.trim() ? '_' + state.clientName.trim().replace(/\s+/g,'_') : '');

  fetch('../pdf.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ html: html, filename: filename })
  })
  .then(function(r){
    const ct = r.headers.get('Content-Type') || '';
    if (ct.includes('application/json') || ct.includes('text/')) {
      return r.text().then(function(t){ throw new Error('Server: ' + t); });
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.blob();
  })
  .then(function(blob){
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename + '.pdf';
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
    btn.textContent = orig; btn.disabled = false;
    logDocument('prvych-30-dni', state.clientName.trim() || 'Klient', state, undefined);
  })
  .catch(function(e){
    console.error(e);
    btn.textContent = orig; btn.disabled = false;
    showToast('Chyba PDF: ' + e.message, 'error');
  });
}

/* ===========================================================================
   UDALOSTI
=========================================================================== */
function bind(){
  document.addEventListener('click', function(e){
    const p = e.target.closest('[data-product]'); if(p){ state.product = p.dataset.product; render(); return; }
  });
  document.addEventListener('change', function(e){
    if(e.target.matches('input[type="checkbox"][data-q]')){
      const i = +e.target.dataset.q;
      if(!state.checked[state.product]) state.checked[state.product] = {};
      state.checked[state.product][i] = e.target.checked;
      renderSteps();
    }
  });
  document.addEventListener('input', function(e){
    if(e.target.id === 'clientName'){ state.clientName = e.target.value; renderSteps(); }
  });
  $('copyBtn').addEventListener('click', doCopy);
  $('pdfBtn').addEventListener('click', doPDF);
  $('resetBtn').addEventListener('click', doReset);
}

/* ===========================================================================
   ŠTART — predvyplní poradcu z prihláseného účtu (whoami)
=========================================================================== */
(function init(){
  bind(); render();
  fetch('/api/whoami.php', { credentials: 'same-origin' })
    .then(function(r){ return r.ok ? r.json() : {}; })
    .then(function(adv){
      if(adv && adv.id){
        ADVISOR.name = adv.name || ADVISOR.name;
        ADVISOR.phone = adv.phone || ADVISOR.phone;
        ADVISOR.email = adv.email || ADVISOR.email;
      }
    })
    .catch(function(){});
})();
</script>

<script src="/assets/shell.js?v=14"></script>
