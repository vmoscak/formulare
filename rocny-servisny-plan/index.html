<!DOCTYPE html>
<html lang="sk"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ročný servisný plán</title>

<!-- =========================================================================
     ROČNÝ SERVISNÝ PLÁN — samostatný editovateľný súbor
     -------------------------------------------------------------------------
     Príprava servisného stretnutia pri výročí zmluvy: poradca zaklikne, čo
     sa u klienta za rok mohlo zmeniť, a vygeneruje pozvánku — PDF pre
     klienta aj krátky text na SMS/WhatsApp. Podporuje dlhodobú starostlivosť,
     nie jednorazový predaj.

     KDE ČO UPRAVIŤ:
       • Témy na kontrolu ...... JS, pole TOPICS
       • Kontakt poradcu ....... JS, objekt ADVISOR (prepíše sa automaticky)
       • Farby / vzhľad ........ zdieľaný dizajnový systém ../assets/ui.css
========================================================================== -->

<script src="../assets/theme-init.js"></script>
<script src="../assets/toast.js?v=1"></script>
<link rel="stylesheet" href="../assets/ui.css?v=13">
<style>
  .sp-topics{display:flex; flex-direction:column; gap:8px;}
  .sp-topic{display:flex; align-items:flex-start; gap:11px; padding:11px 13px; border:1.5px solid var(--border);
    border-radius:var(--radius-lg); cursor:pointer; background:var(--paper); transition:border-color .15s, background .15s;}
  .sp-topic:hover{border-color:var(--accent);}
  .sp-topic.sel{border-color:var(--accent); background:var(--accent-soft);}
  .sp-topic input{margin-top:2px; accent-color:var(--accent); flex-shrink:0;}
  .sp-topic .sp-t{font-size:13px; font-weight:700; color:var(--ink);}
  .sp-topic .sp-d{font-size:11.5px; color:var(--muted); line-height:1.45; margin-top:2px;}
  .sp-list{margin:12px 0 0; padding:0; list-style:none;}
  .sp-list li{display:flex; gap:9px; padding:8px 0; border-bottom:1px solid var(--border); font-size:12.5px; line-height:1.5; color:var(--ink-2);}
  .sp-list li:last-child{border-bottom:none;}
  .sp-list li::before{content:'✓'; color:var(--good); font-weight:800; flex-shrink:0;}
</style>
</head>
<body>

<div class="app">
  <div class="head">
    <div class="head-left">
      <a href="../pomocky.php" class="back-btn" title="Späť na pomôcky">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </a>
      <div class="brand">
        <div class="logo">S</div>
        <div>
          <b>Ročný servisný plán</b><br>
          <small>Pozvánka na servisné stretnutie pri výročí zmluvy</small>
        </div>
      </div>
    </div>
    <div class="head-actions">
      <div class="avatar" id="avatar">📅</div>
    </div>
  </div>

  <div class="body">
    <!-- ============ VSTUPY ============ -->
    <div class="form">
      <div>
        <div class="step-head"><div class="step-num">1</div><div class="step-title">Klient</div></div>
        <div class="fields">
          <div class="field" data-k="clientName">
            <label>MENO KLIENTA</label>
            <input id="clientName" placeholder="napr. Ján Novák">
          </div>
        </div>
      </div>

      <div>
        <div class="step-head"><div class="step-num">2</div><div class="step-title">Čo spolu pri výročí prejdeme</div></div>
        <p style="font-size:12px; color:var(--muted); margin:0 0 10px; line-height:1.55;">Zaklikni témy podľa toho, čo o klientovi vieš — vybrané sa dostanú do pozvánky.</p>
        <div class="sp-topics" id="topicList"></div>
      </div>

      <div>
        <div class="step-head"><div class="step-num">3</div><div class="step-title">Vlastná poznámka (nepovinné)</div></div>
        <div class="fields">
          <div class="field" data-k="note">
            <label>POZNÁMKA DO POZVÁNKY</label>
            <textarea id="note" rows="2" placeholder="napr. Prineste si prosím aktuálny výpis z II. piliera."></textarea>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="btn-ghost" id="resetBtn">Vynulovať</button>
      </div>
    </div>

    <!-- ============ NÁHĽAD ============ -->
    <div class="preview">
      <div class="preview-head">
        <span class="t">Pozvánka pre klienta</span>
        <span class="live"><i></i>Aktualizuje sa naživo</span>
      </div>
      <div class="preview-tools">
        <button class="tool" id="copyBtn">Kopírovať text na SMS/WhatsApp</button>
        <button class="tool" id="pdfBtn">Stiahnuť PDF</button>
      </div>

      <div class="letter-wrap">
        <div id="previewBody" style="background:#fff; border-radius:8px; padding:24px;"></div>
      </div>
    </div>
  </div>
</div>

<script src="../assets/advisor-panel.js?v=2"></script>
<script>
/* ===========================================================================
   DÁTA — témy servisného stretnutia
=========================================================================== */
const TOPICS = [
  { id: 'rodina',   t: 'Zmeny v rodine',                d: 'Nové dieťa, svadba, zmena partnera — mení potrebné krytie aj oprávnené osoby.', default: true },
  { id: 'prijem',   t: 'Zmena príjmu alebo práce',      d: 'Vyšší príjem = vyššia strata pri výpadku. Zmena rizikovosti povolania.', default: true },
  { id: 'majetok',  t: 'Hodnota nehnuteľnosti a vybavenia', d: 'Rekonštrukcia, rast cien — či poistná suma ešte zodpovedá skutočnosti (podpoistenie).', default: true },
  { id: 'hypo',     t: 'Hypotéka a koniec fixácie',     d: 'Blížiaci sa koniec fixácie, možnosti refinancovania, poistenie schopnosti splácať.', default: false },
  { id: 'auto',     t: 'Zmeny pri aute',                d: 'Nové auto, zmena využívania, ročný nájazd — PZP/KASKO nastavenie.', default: false },
  { id: 'zdravie',  t: 'Zdravie a šport',               d: 'Nové športy či aktivity, ktoré môžu vyžadovať pripoistenie.', default: false },
  { id: 'rezerva',  t: 'Rezerva a sporenie',            d: 'Stav finančnej rezervy, pravidelné sporenie/investovanie, ciele na ďalší rok.', default: true },
  { id: 'zmluvy',   t: 'Kontrola existujúcich zmlúv',   d: 'Prehľad všetkých poistiek — duplicity, medzery, možnosti úspory.', default: true },
];

const ADVISOR = { name: 'Vladimír Moščák', email: 'vmfin@vmfin.sk', phone: '+421 910 491 768' };
const state = { clientName: '', selected: TOPICS.filter(t => t.default).map(t => t.id), note: '' };

const $ = id => document.getElementById(id);
function escapeHtml(x){ return String(x==null?'':x).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function selectedTopics(){ return TOPICS.filter(function(t){ return state.selected.indexOf(t.id) !== -1; }); }

/* ===========================================================================
   VYKRESLENIE
=========================================================================== */
function renderTopics(){
  $('topicList').innerHTML = TOPICS.map(function(t){
    const sel = state.selected.indexOf(t.id) !== -1;
    return '<label class="sp-topic' + (sel ? ' sel' : '') + '">'
      + '<input type="checkbox" data-id="' + t.id + '"' + (sel ? ' checked' : '') + '>'
      + '<span><span class="sp-t">' + escapeHtml(t.t) + '</span><br><span class="sp-d">' + escapeHtml(t.d) + '</span></span>'
      + '</label>';
  }).join('');
}

function renderPreview(){
  const name = state.clientName.trim();
  const items = selectedTopics();
  $('previewBody').innerHTML =
    '<div style="font-weight:800; font-size:16px; color:#20242b;">Servisné stretnutie — ročná kontrola</div>'
    + '<p style="font-size:12.5px; color:#8a8f99; margin:4px 0 14px;">' + (name ? escapeHtml(name) : 'Klient') + '</p>'
    + '<p style="font-size:13px; color:#20242b; line-height:1.6;">Raz ročne si spolu prejdeme, či nastavenie zmlúv stále sedí s tým, ako žijete. Tento rok navrhujem prejsť:</p>'
    + '<ul class="sp-list">'
    + items.map(function(t){ return '<li><span><b>' + escapeHtml(t.t) + '</b> — ' + escapeHtml(t.d) + '</span></li>'; }).join('')
    + '</ul>'
    + (state.note.trim() ? '<p style="font-size:12.5px; color:#20242b; margin-top:12px; padding:10px 12px; background:#f6f7f9; border-radius:8px;">📌 ' + escapeHtml(state.note.trim()) + '</p>' : '');
}

function render(){ renderTopics(); renderPreview(); }

/* ===========================================================================
   AKCIE
=========================================================================== */
function doCopy(){
  const name = state.clientName.trim();
  const greeting = name ? 'Dobrý deň, ' + name + ',' : 'Dobrý deň,';
  const txt = greeting + '\n\nblíži sa výročie Vašej zmluvy — rád si s Vami dohodnem krátke servisné stretnutie (cca 30 min). Prejdeme spolu:\n\n'
    + selectedTopics().map(function(t){ return '• ' + t.t; }).join('\n')
    + (state.note.trim() ? '\n\n📌 ' + state.note.trim() : '')
    + '\n\nKedy by sa Vám hodilo? Stačí odpísať deň a čas.\n\n'
    + (ADVISOR.name || '') + (ADVISOR.phone ? ' · ' + ADVISOR.phone : '');
  try{ if(navigator.clipboard) navigator.clipboard.writeText(txt); }catch(e){}
  const b = $('copyBtn'); const orig = b.textContent;
  b.textContent = 'Skopírované ✓'; setTimeout(function(){ b.textContent = orig; }, 1600);
}

/* ===========================================================================
   PDF PRE KLIENTA (server-side Dompdf cez zdieľaný ../pdf.php, presné A4)
=========================================================================== */
function buildLetterHtml(){
  const name = state.clientName.trim() || 'Klient';
  const today = new Date();
  const SK_MONTHS = ['január','február','marec','apríl','máj','jún','júl','august','september','október','november','december'];
  const dateStr = today.getDate() + '. ' + SK_MONTHS[today.getMonth()] + ' ' + today.getFullYear();

  const rows = selectedTopics().map(function(t, idx){
    return '<table class="sp-item"><tr>'
      + '<td class="sp-num-cell"><span class="sp-num">' + (idx + 1) + '</span></td>'
      + '<td><div class="sp-t">' + escapeHtml(t.t) + '</div><div class="sp-d">' + escapeHtml(t.d) + '</div></td>'
      + '</tr></table>';
  }).join('');

  const css = `
    @font-face { font-family:'DejaVu Sans'; src:url('../vendor/dompdf/lib/fonts/DejaVuSans.ttf'); }
    @font-face { font-family:'DejaVu Sans'; font-weight:bold; src:url('../vendor/dompdf/lib/fonts/DejaVuSans-Bold.ttf'); }
    * { box-sizing:border-box; }
    div,p,span { margin:0; padding:0; }
    body { margin:0; padding:0; font-family:'DejaVu Sans',sans-serif; font-size:10.5pt; line-height:1.5; color:#20242b; background:#fff; }
    .doctitle { text-align:center; font-size:19pt; letter-spacing:.3pt; font-weight:bold; padding:2pt 0 3pt; color:#4338ca; }
    .card-sub { text-align:center; font-size:10.5pt; color:#666; margin-bottom:5mm; }
    .meta { text-align:center; font-size:9pt; color:#8a8a8a; margin-bottom:8mm; padding-bottom:5mm; border-bottom:1pt solid #e5e5e5; }
    .intro { font-size:10.5pt; margin-bottom:6mm; }
    .sp-item { width:100%; border-collapse:collapse; margin-bottom:3.5mm; background:#f4f5ff; border-left:3pt solid #4f46e5; border-radius:0 2.5mm 2.5mm 0; }
    .sp-item td { padding:4mm 4.5mm; vertical-align:top; }
    .sp-num-cell { width:22pt; padding-right:0; }
    .sp-num { display:inline-block; width:16pt; height:16pt; border-radius:50%; background:#4f46e5; color:#fff;
      text-align:center; font-size:9pt; font-weight:bold; line-height:16pt; }
    .sp-t { font-size:10.5pt; font-weight:bold; margin-bottom:1mm; }
    .sp-d { font-size:9.5pt; color:#555; line-height:1.45; }
    .note { margin-top:5mm; padding:4mm 5mm; background:#fffbeb; border-left:3pt solid #d97706; border-radius:0 2.5mm 2.5mm 0; font-size:9.5pt; }
    .contact { margin-top:7mm; padding:4.5mm 5mm; background:#eef2ff; border-radius:2.5mm; font-size:9.5pt; text-align:center; }
    .contact b { color:#4338ca; }
    @page{ margin:20mm 20mm 20mm 20mm; }
  `;

  return '<!DOCTYPE html><html lang="sk"><head>'
    + '<meta http-equiv="Content-Type" content="text/html; charset=utf-8">'
    + '<title>Ročný servisný plán</title><style>' + css + '</style></head><body>'
    + '<div class="doctitle">Servisné stretnutie</div>'
    + '<div class="card-sub">Ročná kontrola nastavenia zmlúv</div>'
    + '<div class="meta">' + escapeHtml(name) + ' &middot; ' + dateStr + '</div>'
    + '<p class="intro">Raz ročne si spolu prejdeme, či nastavenie Vašich zmlúv stále zodpovedá tomu, ako žijete — aby ste neplatili za to, čo nepotrebujete, a mali kryté to, čo je dôležité. Tento rok navrhujem prejsť:</p>'
    + rows
    + (state.note.trim() ? '<div class="note"><b>Poznámka:</b> ' + escapeHtml(state.note.trim()) + '</div>' : '')
    + '<div class="contact">Termín si dohodneme podľa Vašich možností: <b>' + escapeHtml(ADVISOR.name || '') + '</b>'
      + (ADVISOR.phone ? ' &middot; ' + escapeHtml(ADVISOR.phone) : '')
      + (ADVISOR.email ? ' &middot; ' + escapeHtml(ADVISOR.email) : '') + '</div>'
    + '</body></html>';
}

function doPDF(){
  const btn = $('pdfBtn'); const orig = btn.textContent;
  btn.textContent = 'Generujem…'; btn.disabled = true;

  const html = buildLetterHtml();
  const filename = 'Servisny_plan' + (state.clientName.trim() ? '_' + state.clientName.trim().replace(/\s+/g,'_') : '');

  fetch('../pdf.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ html: html, filename: filename })
  })
  .then(function(r){
    const ct = r.headers.get('Content-Type') || '';
    if (ct.includes('application/json') || ct.includes('text/')) {
      return r.text().then(function(t){ throw new Error('Server: ' + t); });
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.blob();
  })
  .then(function(blob){
    downloadOrSharePdfBlob(blob, filename);
    btn.textContent = orig; btn.disabled = false;
    logDocument('rocny-servisny-plan', state.clientName.trim() || 'Klient', state, undefined);
  })
  .catch(function(e){
    console.error(e);
    btn.textContent = orig; btn.disabled = false;
    showToast('Chyba PDF: ' + e.message, 'error');
  });
}

/* ===========================================================================
   UDALOSTI A ŠTART — predvyplní poradcu z prihláseného účtu (whoami)
=========================================================================== */
(function init(){
  $('clientName').addEventListener('input', function(){ state.clientName = this.value; renderPreview(); });
  $('note').addEventListener('input', function(){ state.note = this.value; renderPreview(); });
  $('topicList').addEventListener('change', function(e){
    const cb = e.target.closest('input[data-id]');
    if(!cb) return;
    const id = cb.dataset.id;
    if(cb.checked){ if(state.selected.indexOf(id) === -1) state.selected.push(id); }
    else { state.selected = state.selected.filter(function(x){ return x !== id; }); }
    render();
  });
  $('resetBtn').addEventListener('click', function(){
    state.clientName = ''; state.note = '';
    state.selected = TOPICS.filter(function(t){ return t.default; }).map(function(t){ return t.id; });
    $('clientName').value = ''; $('note').value = '';
    render();
  });
  $('copyBtn').addEventListener('click', doCopy);
  $('pdfBtn').addEventListener('click', doPDF);
  render();

  wireClientAutocomplete('rocny-servisny-plan', 'clientName');
  autoOpenSavedDocument(function(d){
    Object.assign(state, d);
    $('clientName').value = state.clientName || '';
    $('note').value = state.note || '';
    render();
  }, doPDF);

  fetch('/api/whoami.php', { credentials: 'same-origin' })
    .then(function(r){ return r.ok ? r.json() : {}; })
    .then(function(adv){
      if(adv && adv.id){
        ADVISOR.name = adv.name || ADVISOR.name;
        ADVISOR.phone = adv.phone || ADVISOR.phone;
        ADVISOR.email = adv.email || ADVISOR.email;
      }
    })
    .catch(function(){});
})();
</script>

<script src="/assets/shell.js?v=22"></script>
