<title>Argument Builder</title>

<!-- =========================================================================
     ARGUMENT BUILDER — samostatný editovateľný súbor
     -------------------------------------------------------------------------
     Vyber produkt a (voliteľne) typ klienta — poskladá sa zoznam odporúčaných
     argumentov/benefitov na predstavenie produktu. Opak Ťaháku „čo pýtať“ —
     toto je čo POVEDAŤ, nie čo sa pýtať. Argumenty sú kartičky na rýchle
     pozretie počas rozhovoru (nič sa neodškrtáva — je to pomôcka poradcu, nie
     kontrolný zoznam pre klienta). Kopírovať alebo stiahnuť ako PDF. Voliteľné
     meno klienta, PDF cez zdieľaný ../pdf.php (Dompdf).

     KDE ČO UPRAVIŤ:
       • Produkty, typy klienta a argumenty ... JS, objekty PRODUCTS / CLIENT_TYPES
       • Farby / vzhľad ........................ zdieľaný dizajnový systém ../assets/ui.css
========================================================================== -->

  }
  .ab-chip:hover{border-color:var(--accent-line);}
  .ab-chip.sel{background:var(--accent); border-color:var(--accent); color:#fff;}
</style>
</head>

<script src="../assets/advisor-panel.js"></script>
<script>
/* ===========================================================================
   DÁTA — tu meníš produkty, typy klienta a argumenty
   -------------------------------------------------------------------------
   Argument s prázdnym tags = univerzálny (zobrazí sa vždy). Argument s
   tags = zobrazí sa len keď je zvolený zodpovedajúci typ klienta, alebo keď
   nie je zvolený žiadny typ (vtedy sa zobrazia úplne všetky).
=========================================================================== */
const CLIENT_TYPES = {
  mlada_rodina: 'Mladá rodina',
  szco: 'SZČO / podnikateľ',
  senior: 'Senior / preddôchodok',
  single: 'Slobodný/á',
  par: 'Pár bez detí',
};

const PRODUCTS = {
  zivotne: {
    label: 'Životné poistenie', sub: 'Ochrana príjmu a rodiny', tile: 'Ž',
    arguments: [
      { text: 'Poistenie nie je výdavok, ale prevod rizika — cena zlyhania je vždy vyššia ako cena poistky.', tags: [] },
      { text: 'Po úmrtí sa bankové účty zmrazia až do konca dedičského konania (mesiace, niekedy aj vyše roka) — poistné plnenie ide priamo určenej osobe mimo dedičského konania, spravidla do pár týždňov, takže rodina má hneď z čoho žiť.', tags: [] },
      { text: 'Kto by financoval domácnosť a starostlivosť o deti, keby ste najbližší rok nemohli pracovať?', tags: ['mlada_rodina'] },
      { text: 'Ako SZČO nemáte nemocenské vo výške bežného príjmu — štátna dávka pokryje len jeho zlomok.', tags: ['szco'] },
      { text: 'Aj bez detí je dobré mať krytie pre dlhodobú PN alebo invaliditu — príjem potrebujete bez ohľadu na rodinný stav.', tags: ['single'] },
      { text: 'Aj bez detí platíte spoločné výdavky z dvoch príjmov — ak jeden vypadne, druhý musí pokryť rozdiel sám, nielen svoju polovicu.', tags: ['par'] },
      { text: 'Poistenie kryjúce záväzky chráni pozostalých pred prevzatím dlhu po vás.', tags: ['senior'] },
    ],
  },
  majetok: {
    label: 'Poistenie majetku', sub: 'Domácnosť a nehnuteľnosť', tile: 'M',
    arguments: [
      { text: 'Hodnota domácnosti sa v priebehu rokov mení — poistná suma by mala rásť spolu s ňou, nie zostať pri pôvodnej hodnote.', tags: [] },
      { text: 'Pri hypotéke banka vyžaduje poistenie nehnuteľnosti — dá sa nastaviť tak, aby kryla aj vybavenie domácnosti, nielen múry.', tags: ['mlada_rodina'] },
      { text: 'Ak podnikáte z domu alebo máte v domácnosti drahšie pracovné vybavenie, je to už súčasťou poistenia domácnosti — len treba nastaviť poistnú sumu tak, aby ho reálne pokrývala.', tags: ['szco'] },
      { text: 'Staršia nehnuteľnosť môže mať vyššie riziko škody (rozvody, strecha) — oplatí sa preveriť, či to poistka pokrýva.', tags: ['senior'] },
      { text: 'Aj v prenajatom alebo menšom byte má zmysel poistiť aspoň vybavenie domácnosti — nie len samotné múry.', tags: ['single', 'par'] },
    ],
  },
  investicie: {
    label: 'Investície, II. a III. pilier', sub: 'Dlhodobé zhodnocovanie a dôchodok', tile: 'I',
    arguments: [
      { text: 'Peniaze na bežnom účte strácajú hodnotu kvôli inflácii — investovanie nie je hazard, je to obrana pred infláciou.', tags: [] },
      { text: 'Nemôžeme sa spoliehať na to, že štátny priebežný systém (I. pilier) ostane v súčasnej podobe — dôchodcov pribúda rýchlejšie ako pracujúcich.', tags: [] },
      { text: 'V II. pilieri si vyberáte správcu aj pomer akciovej/dlhopisovej zložky — správne nastavenie podľa veku výrazne ovplyvňuje výsledný dôchodok.', tags: [] },
      { text: 'Čím skôr začnete, tým viac pracuje vo váš prospech zložené úrokovanie — čas je tu dôležitejší ako výška sumy.', tags: ['mlada_rodina', 'single', 'par'] },
      { text: 'Ako SZČO si musíte dôchodok vybudovať sami — štátny dôchodok bude počítaný z nižšieho vymeriavacieho základu.', tags: ['szco'] },
      { text: 'V tomto veku má zmysel presunúť časť portfólia do konzervatívnejších nástrojov, nie prestať investovať úplne.', tags: ['senior'] },
    ],
  },
  hypoteka: {
    label: 'Hypotéka / refinancovanie', sub: 'Úver na bývanie', tile: 'H',
    arguments: [
      { text: 'Aj malý rozdiel v úrokovej sadzbe sa pri dlhej splatnosti prejaví v státisícoch eur — oplatí sa to prepočítať.', tags: [] },
      { text: 'Fixácia, ktorá sa blíži ku koncu, je najlepší moment na porovnanie ponúk — banka neponúkne najlepšiu sadzbu sama od seba.', tags: ['mlada_rodina', 'par'] },
      { text: 'Príjem zo živnosti sa dokladuje inak ako zo zamestnania — oplatí sa vopred vedieť, ktoré banky sú v tomto flexibilnejšie.', tags: ['szco'] },
    ],
  },
  auto: {
    label: 'PZP a havarijné', sub: 'Poistenie vozidla', tile: 'A',
    arguments: [
      { text: 'PZP kryje škodu, ktorú spôsobíte vy — havarijné kryje škodu na vašom aute, aj keď za ňu nemôžete.', tags: [] },
      { text: 'Ak sa vám plné havarijné zdá zbytočné, zvážte aspoň pripoistenie živlu a skla k PZP — lacné riešenie na najčastejšie drobné škody.', tags: [] },
      { text: 'Pri novšom alebo drahšom aute sa havarijné poistenie oplatí najmä prvé roky, kým hodnota auta neklesne.', tags: ['mlada_rodina', 'szco'] },
      { text: 'Ak autom jazdí aj mladý vodič v domácnosti, oplatí sa preveriť pripoistenie a vplyv na cenu.', tags: ['mlada_rodina'] },
    ],
  },
};

const state = { product: 'zivotne', clientType: null, clientName: '' };

const $ = id => document.getElementById(id);
function escapeHtml(x){ return String(x==null?'':x).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ===========================================================================
   VÝBER ARGUMENTOV
=========================================================================== */
function argsForCurrent(){
  const prod = PRODUCTS[state.product];
  if (!state.clientType) return prod.arguments;
  return prod.arguments.filter(function(a){ return a.tags.length === 0 || a.tags.indexOf(state.clientType) !== -1; });
}

/* ===========================================================================
   VYKRESLENIE
=========================================================================== */
function renderProducts(){
  $('products').innerHTML = Object.keys(PRODUCTS).map(function(k){
    const p = PRODUCTS[k], sel = k === state.product ? ' sel' : '';
    return '<div class="type' + sel + '" data-product="' + k + '">'
      + '<div class="tile">' + p.tile + '</div>'
      + '<div><div class="t-label">' + escapeHtml(p.label) + '</div><div class="t-sub">' + escapeHtml(p.sub) + '</div></div></div>';
  }).join('');
}

function renderClientTypes(){
  $('clientTypes').innerHTML = Object.keys(CLIENT_TYPES).map(function(k){
    const sel = state.clientType === k ? ' sel' : '';
    return '<div class="ab-chip' + sel + '" data-client="' + k + '">' + escapeHtml(CLIENT_TYPES[k]) + '</div>';
  }).join('');
}

function renderArgs(){
  const prod = PRODUCTS[state.product];
  const args = argsForCurrent();
  $('avatar').textContent = prod.tile;
  $('argList').innerHTML = '<div style="font-weight:700; font-size:15px; color:#20242b; margin-bottom:4px;">' + escapeHtml(prod.label) + '</div>'
    + '<p style="font-size:12.5px; color:#8a8f99; margin-bottom:14px;">' + args.length + ' z ' + prod.arguments.length + ' argumentov'
      + (state.clientType ? ' pre „' + escapeHtml(CLIENT_TYPES[state.clientType]) + '“' : '') + '</p>'
    + args.map(function(a, idx){
        return '<div class="rec-card" style="margin-bottom:10px;">'
          + '<div class="rc-title" style="align-items:flex-start;"><span class="rc-num">' + (idx + 1) + '</span>'
          + '<span style="font-weight:400; font-size:13.5px; color:var(--ink-2); line-height:1.55;">' + escapeHtml(a.text) + '</span></div>'
          + '</div>';
      }).join('');
}

function render(){ renderProducts(); renderClientTypes(); renderArgs(); }

/* ===========================================================================
   AKCIE
=========================================================================== */
function doCopy(){
  const prod = PRODUCTS[state.product];
  const args = argsForCurrent();
  const txt = prod.label + (state.clientType ? ' — ' + CLIENT_TYPES[state.clientType] : '') + '\n\n'
    + args.map(function(a, idx){ return (idx + 1) + '. ' + a.text; }).join('\n');
  try{ if(navigator.clipboard) navigator.clipboard.writeText(txt); }catch(e){}
  const b = $('copyBtn'); const orig = b.textContent;
  b.textContent = 'Skopírované ✓'; setTimeout(function(){ b.textContent = orig; }, 1600);
}

/* ===========================================================================
   PDF PRE KLIENTA (server-side Dompdf cez zdieľaný ../pdf.php, presné A4)
=========================================================================== */
function buildLetterHtml(){
  const prod = PRODUCTS[state.product];
  const args = argsForCurrent();
  const clientName = state.clientName.trim() || 'Klient';
  const today = new Date();
  const SK_MONTHS = ['január','február','marec','apríl','máj','jún','júl','august','september','október','november','december'];
  const dateStr = today.getDate() + '. ' + SK_MONTHS[today.getMonth()] + ' ' + today.getFullYear();

  const rows = args.map(function(a, idx){
    return '<div class="ab-item"><span class="ab-num">' + (idx + 1) + '</span>'
      + '<span class="ab-q">' + escapeHtml(a.text) + '</span></div>';
  }).join('');

  const css = `
    @font-face { font-family:'DejaVu Sans'; src:url('../vendor/dompdf/lib/fonts/DejaVuSans.ttf'); }
    @font-face { font-family:'DejaVu Sans'; font-weight:bold; src:url('../vendor/dompdf/lib/fonts/DejaVuSans-Bold.ttf'); }
    * { box-sizing:border-box; }
    div,p,span { margin:0; padding:0; }
    body { margin:0; padding:0; font-family:'DejaVu Sans',sans-serif; font-size:10.5pt; line-height:1.5; color:#20242b; background:#fff; }
    .pdf-topbar { height:3mm; background:#ea580c; border-radius:0.8mm; margin-bottom:6mm; } .doctitle { text-align:center; font-size:16pt; letter-spacing:.5pt; font-weight:bold; padding:7pt 0 2pt; }
    .card-sub { text-align:center; font-size:10.5pt; color:#666; margin-bottom:5mm; }
    .meta { text-align:center; font-size:9pt; color:#8a8a8a; margin-bottom:9mm; padding-bottom:5mm; border-bottom:1pt solid #e5e5e5; }
    .ab-hd { color:#fff; background:#ea580c; font-weight:bold; font-size:12pt; padding:3mm 4mm; border-radius:2mm; margin-bottom:5mm; }
    .ab-item { display:flex; align-items:flex-start; padding:3mm 3.5mm; margin-bottom:2.5mm; background:#f5f4f0; border-radius:2mm; }
    .ab-num { width:14pt; height:14pt; flex-shrink:0; margin-right:7pt; border-radius:50%; background:#ea580c; color:#fff; text-align:center; font-size:8.5pt; font-weight:bold; line-height:14pt; }
    .ab-q { font-size:10.5pt; }
    @page{ margin:20mm 20mm 20mm 20mm; }
  `;

  return '<!DOCTYPE html><html lang="sk"><head>'
    + '<meta http-equiv="Content-Type" content="text/html; charset=utf-8">'
    + '<title>Argument Builder</title><style>' + css + '</style></head><body>'
    + '<div class="pdf-topbar"></div><div class="doctitle">Argumenty na predstavenie produktu</div>'
    + '<div class="card-sub">' + escapeHtml(prod.label) + (state.clientType ? ' — ' + escapeHtml(CLIENT_TYPES[state.clientType]) : '') + '</div>'
    + '<div class="meta">' + escapeHtml(clientName) + ' &middot; ' + dateStr + '</div>'
    + '<div class="ab-hd">' + escapeHtml(prod.label) + '</div>'
    + rows
    + '</body></html>';
}

function doPDF(){
  const btn = $('pdfBtn'); const orig = btn.textContent;
  btn.textContent = 'Generujem…'; btn.disabled = true;

  const html = buildLetterHtml();
  const filename = 'Argumenty_' + state.product + (state.clientName.trim() ? '_' + state.clientName.trim().replace(/\s+/g,'_') : '');

  fetch('../pdf.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ html: html, filename: filename })
  })
  .then(function(r){
    const ct = r.headers.get('Content-Type') || '';
    if (ct.includes('application/json') || ct.includes('text/')) {
      return r.text().then(function(t){ throw new Error('Server: ' + t); });
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.blob();
  })
  .then(function(blob){
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename + '.pdf';
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
    btn.textContent = orig; btn.disabled = false;
    logDocument('argument-builder', state.clientName.trim() || 'Klient', state, undefined);
  })
  .catch(function(e){
    console.error(e);
    btn.textContent = orig; btn.disabled = false;
    showToast('Chyba PDF: ' + e.message, 'error');
  });
}

/* ===========================================================================
   UDALOSTI
=========================================================================== */
function bind(){
  document.addEventListener('click', function(e){
    const p = e.target.closest('[data-product]'); if(p){ state.product = p.dataset.product; render(); return; }
    const c = e.target.closest('[data-client]'); if(c){
      state.clientType = state.clientType === c.dataset.client ? null : c.dataset.client;
      render(); return;
    }
  });
  $('contactName').addEventListener('input', function(e){ state.clientName = e.target.value; });
  $('copyBtn').addEventListener('click', doCopy);
  $('pdfBtn').addEventListener('click', doPDF);
}

/* ===========================================================================
   ŠTART
=========================================================================== */
(function init(){
  bind(); render();
})();
</script>
