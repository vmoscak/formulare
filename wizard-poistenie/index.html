const QUESTIONS = [

const state = {
  step: 0, // 0..QUESTIONS.length-1 = otázky, QUESTIONS.length = výsledky

/* ===========================================================================
   LOGIKA ODPORÚČANIA
=========================================================================== */
function computeRecommendations(){
  const a = state.answers;
  const has = t => a.existingIns.includes(t);
  const recs = [];

  if(a.hasDependents==='ano'){
    recs.push({ key:'zivotne', title:'Životné poistenie', why: has('zivotne')
      ? 'Životné poistenie už máš — odporúčame skontrolovať, či poistná suma a rozsah (invalidita, trvalé následky úrazu, kritické choroby, dlhodobá PN) zodpovedajú aktuálnym záväzkom a počtu detí.'
      : 'Máš osoby závislé od tvojho príjmu — životné poistenie dnes bežne nekryje len riziko úmrtia, ale aj invaliditu, trvalé následky úrazu, kritické choroby a dlhodobú PN, takže ochráni rodinu pri väčšine vážnych životných situácií, nielen pri tej najhoršej.' });
  }

  if(a.property==='obyvam'){
    recs.push({ key:'domacnost', title:'Poistenie majetku a domácnosti', why: has('majetkove')
      ? 'Majetkové poistenie už máš — odporúčame overiť, či poistná suma zodpovedá aktuálnej hodnote nehnuteľnosti a vybavenia.'
      : 'Chráni nehnuteľnosť, v ktorej bývaš, a vybavenie domácnosti pred škodami (napr. požiar, voda, krádež).' });
  }
  if(a.property==='prenajimam'){
    recs.push({ key:'prenajom', title:'Poistenie prenajímanej nehnuteľnosti',
      why:'Pri prenájme je vhodné majetkové poistenie rozšírené o zodpovednosť prenajímateľa a prípadný výpadok nájomného.' });
  }

  if(a.status==='szco' || a.concern==='vypadok'){
    recs.push({ key:'pn', title:'Poistenie príjmu pri PN / práceneschopnosti', why: a.status==='szco'
      ? 'Ako SZČO nemáš nárok na náhradu príjmu od zamestnávateľa počas PN — štátne nemocenské pokryje len časť príjmu.'
      : 'Štátne nemocenské dávky pokrývajú len časť príjmu — poistenie doplní rozdiel počas dlhšej PN.' });
  }

  if(a.status==='majitel'){
    recs.push({ key:'zodpovednost', title:'Poistenie zodpovednosti podnikateľa/firmy',
      why:'Ako majiteľ/-ka firmy nesieš podnikateľské riziká a zodpovednosť za škody spôsobené pri činnosti firmy.' });
  }

  if(a.status==='zamestnanec'){
    recs.push({ key:'zodpovednostZamestnanca', title:'Zodpovednosť zamestnanca voči zamestnávateľovi',
      why:'Podľa povahy tvojej práce (napr. práca s vozidlom, hotovosťou, drahým vybavením alebo citlivými dokumentmi) zváž poistenie zodpovednosti za škodu, ktorú by si mohol/-la spôsobiť zamestnávateľovi.' });
  }

  if(a.carIns==='pzp'){
    recs.push({ key:'auto', title:'Doplnkové poistenie auta',
      why:'Samotné PZP kryje len škodu, ktorú spôsobíš inému vodičovi — vlastné auto pri požiari, krupobití, rozbitom skle alebo krádeži zostáva nepoistené. Zváž aspoň doplnenie o živel a sklo, pri novšom alebo úverovanom aute aj havarijné poistenie.' });
  }

  if(a.travel==='ano'){
    recs.push({ key:'cestovne', title:'Cestovné poistenie',
      why:'Cestovné poistenie kryje liečebné náklady v zahraničí (verejné zdravotné poistenie ich mimo SR/EÚ nepokryje alebo len čiastočne) aj náklady horskej záchrannej služby na Slovensku, ktoré si bez poistenia hradíš sám/-a a môžu dosiahnuť tisíce eur.' });
  }

  const seen = new Set();
  let uniq = recs.filter(r => seen.has(r.key) ? false : (seen.add(r.key), true));

  if(!uniq.length){
    uniq.push({ key:'zaklad', title:'Základné poistenie',
      why:'Zatiaľ nemáš výraznejšie záväzky ani závislé osoby — odporúčame začať základným krytím pre prípad smrti, invalidity, trvalých následkov úrazu, kritických chorôb a dlhodobej PN ako štartovacím bodom.' });
  }

  const priority = { rodina:['zivotne'], majetok:['domacnost','prenajom'], vypadok:['pn'] };
  const boost = priority[a.concern] || [];
  uniq = uniq.map((r,i)=>({...r, _i:i})).sort((x,y)=>
    (boost.includes(y.key)?1:0) - (boost.includes(x.key)?1:0) || x._i-y._i);

  return uniq;
}

const $ = id => document.getElementById(id);
const TOTAL_STEPS = QUESTIONS.length + 1; // + výsledky

function updateProgress(){
  const stepNo = Math.min(state.step+1, QUESTIONS.length);
  const pct = Math.round(((state.step)/QUESTIONS.length)*100);
  if(state.step < QUESTIONS.length){
    $('progressLabel').textContent = 'Otázka '+stepNo+' z '+QUESTIONS.length;
    $('progressPct').textContent = pct+' %';
    $('progressFill').style.width = Math.max(6,pct)+'%';
    $('progressWrap').style.display = '';
  } else {
    $('progressLabel').textContent = 'Výsledok';
    $('progressPct').textContent = '100 %';
    $('progressFill').style.width = '100%';
  }
}

function isAnswered(q){
  const v = state.answers[q.key];
  return q.type==='multi' ? v.length>0 : !!v;
}

function renderQuestion(){
  const q = QUESTIONS[state.step];
  const val = state.answers[q.key];

  const optsHtml = q.options.map(o=>{
    const selected = q.type==='multi' ? val.includes(o.v) : val===o.v;
    const shape = q.type==='multi'
      ? '<div class="chk">'+(selected?'✓':'')+'</div>'
      : '<div class="radio"><i></i></div>';
    return '<div class="opt'+(selected?' sel':'')+'" data-v="'+o.v+'">'+shape+'<div class="label">'+o.label+'</div></div>';
  }).join('');

  $('panel').innerHTML = ''
    + '<h1 class="q-title">'+q.title+'</h1>'
    + (q.sub ? '<p class="q-sub">'+q.sub+'</p>' : '<div style="margin-bottom:18px;"></div>')
    + '<div class="opts" id="opts">'+optsHtml+'</div>'
    + '<div class="nav-row">'
      + (state.step>0 ? '<button class="btn-ghost" id="backBtn">Späť</button>' : '')
      + '<button class="btn-primary" id="nextBtn" '+(isAnswered(q)?'':'disabled')+'>'+(state.step===QUESTIONS.length-1?'Zobraziť odporúčanie':'Pokračovať')+'</button>'
    + '</div>';

  $('opts').addEventListener('click', e=>{
    const opt = e.target.closest('.opt'); if(!opt) return;
    const v = opt.dataset.v;
    if(q.type==='multi'){
      const optDef = q.options.find(o=>o.v===v);
      let arr = state.answers[q.key].slice();
      if(optDef.exclusive){
        arr = arr.includes(v) ? [] : [v];
      } else {
        arr = arr.filter(x => !(q.options.find(o=>o.v===x)||{}).exclusive);
        if(arr.includes(v)) arr = arr.filter(x=>x!==v); else arr.push(v);
      }
      state.answers[q.key] = arr;
    } else {
      state.answers[q.key] = v;
    }
    renderQuestion();
  });

  if($('backBtn')) $('backBtn').addEventListener('click', ()=>{ state.step--; render(); });
  $('nextBtn').addEventListener('click', ()=>{
    if(!isAnswered(q)) return;
    state.step++;
    render();
  });
}

/* Odkaz do Kalkulačky poistného krytia s predvyplnením podľa odpovedí
   z tohto dotazníka (meno klienta, náznak detí/úveru) + odporúčania, ktoré
   kalkulačka nevie dopočítať číselne (majetok, zodpovednosť, auto,
   cestovné...) — tie sa cez seed prenesú ďalej až do checklistu, aby bol
   výstupom oboch predchádzajúcich krokov, nielen tejto kalkulačky. Životné
   poistenie a PN sa nenesú ďalej — tie kalkulačka prepočíta presne sama. */
function gapCalcUrl(){
  const nameField = $('clientLinkLabel');
  const contactName = (nameField ? nameField.value.trim() : '') || clientLinkLabel || state.contactName.trim();
  const carryChecklist = computeRecommendations()
    .filter(r => r.key!=='zivotne' && r.key!=='pn')
    .map(r => ({ title:r.title }));
  const seed = {
    contactName: contactName,
    hasDependents: state.answers.hasDependents==='ano',
    hasLoan: state.answers.hasLoan==='ano',
    carryChecklist: carryChecklist,
  };
  return '../financna-medzera/?seed=' + encodeURIComponent(JSON.stringify(seed));
}

    + '</div>';

  const myDocumentsHtml = CLIENT_TOKEN ? '' : ''

      + '<p>Vráť sa k už vygenerovanému PDF a znova si ho stiahni.</p>'
      + '<div id="myDocumentsList"></div>'
    + '</div>';

  const contactOrSubmitHtml = CLIENT_TOKEN ? ''

      + '<h3>Odoslať odpovede poradcovi</h3>'
      + '<p>Poradca dostane vaše odpovede a spoločne si prejdete konkrétne možnosti.</p>'
      + '<div class="contact-actions"><button class="btn-primary" id="clientSubmitBtn" style="width:100%;">Odoslať poradcovi</button></div>'
    + '</div>'
    + '<div class="contact-card" id="clientThankYou" style="display:none;">'
      + '<h3 id="thankYouMsg"></h3>'
      + '<button class="btn-primary" id="clientPdfBtn" style="width:100%; margin-top:8px;">Stiahnuť moje zhrnutie (PDF)</button>'
    + '</div>'
    : '';

  $('panel').innerHTML = ''
    + '<div class="res-head">'
      + '<div class="ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg></div>'
      + '<h2>Odporúčané typy poistenia</h2>'
      + '<p>Na základe tvojich odpovedí odporúčame prebrať s poradcom nasledovné typy krytia.</p>'
    + '</div>'
    + '<div class="rec-list">'+recHtml+'</div>'
    + pdfCardHtml
    + clientRequestsHtml
    + myDocumentsHtml
    + (CLIENT_TOKEN ? '' : '<a class="gap-link" href="'+gapCalcUrl()+'">Chcete presne prepočítať, koľko by vám chýbalo? →</a>')
    + contactOrSubmitHtml
    + (CLIENT_TOKEN ? '' : '<div class="restart" id="restartBtn">↺ Vyplniť dotazník znova</div>');

  if(!CLIENT_TOKEN){
    $('pdfBtn').addEventListener('click', doGeneratePdf);
    $('restartBtn').addEventListener('click', doRestart);
    loadClientRequests();
    loadMyDocuments();
  } else {
    $('clientSubmitBtn').addEventListener('click', doClientSubmit);
    $('clientPdfBtn').addEventListener('click', doGeneratePdf);
  }
}

function render(){
  updateProgress();
  if(state.step < QUESTIONS.length) renderQuestion(); else renderResults();
}

const SK_MONTHS = ['január','február','marec','apríl','máj','jún','júl','august','september','október','november','december'];
function fmtDateSk(d){ return d.getDate()+'. '+SK_MONTHS[d.getMonth()]+' '+d.getFullYear(); }

const REC_BADGES = {
  zivotne:{ cls:'warm' },
  domacnost:{ cls:'warm' },
  prenajom:{ cls:'warm' },
  pn:{ cls:'warm' },
  zodpovednost:{ cls:'teal' },
  zodpovednostZamestnanca:{ cls:'teal' },
  auto:{ cls:'warm' },
  cestovne:{ cls:'teal' },
  zaklad:{ cls:'warm' },
};

function profileChips(){
  const a = state.answers;
  const insLabel = { zamestnanec:'Zamestnanec/-kyňa', szco:'SZČO', majitel:'Majiteľ/-ka firmy' };
  const chips = [{ label:insLabel[a.status]||a.status, cls:'teal' }];
  if(a.hasDependents==='ano') chips.push({ label:'Deti / závislé osoby', cls:'warm' });
  if(a.hasLoan==='ano') chips.push({ label:'Hypotéka / úver', cls:'warm' });
  if(a.property==='obyvam') chips.push({ label:'Vlastný byt', cls:'teal' });
  if(a.property==='prenajimam') chips.push({ label:'Prenajíma nehnuteľnosť', cls:'teal' });
  return chips;
}

/* Zmieša hex farbu s bielou (napr. na svetlé pozadie zvýraznenia) — Dompdf
   nepodporuje CSS color-mix(), preto počítame ručne. */
function hexTint(hex, ratio){
  const n = parseInt(hex.replace('#',''), 16);
  const r = (n>>16)&255, g = (n>>8)&255, b = n&255;
  const mix = c => Math.round(c + (255-c)*ratio);
  return 'rgb('+mix(r)+','+mix(g)+','+mix(b)+')';
}

  const recsHtml = recs.map(r => {
    const b = REC_BADGES[r.key] || { cls:'teal' };
    return ''
      + '<div class="rec '+b.cls+'">'
      + '<div class="rec-title">'+escapeHtml(r.title)+'</div><div class="rec-why">'+escapeHtml(r.why)+'</div>'
      + '</div>';
  }).join('');

  const css = `
    @font-face { font-family:'DejaVu Sans'; src:url('`+fontBase+`DejaVuSans.ttf'); }
    @font-face { font-family:'DejaVu Sans'; font-weight:bold; src:url('`+fontBase+`DejaVuSans-Bold.ttf'); }
    @font-face { font-family:'DejaVu Serif'; font-weight:bold; src:url('`+fontBase+`DejaVuSerif-Bold.ttf'); }
    @font-face { font-family:'DejaVu Sans Mono'; src:url('`+fontBase+`DejaVuSansMono.ttf'); }
    * { box-sizing:border-box; }
    div,p,table,tr,td,th,strong,span { margin:0; padding:0; }
    body { margin:0; padding:0; font-family:'DejaVu Sans',sans-serif; font-size:10pt; line-height:1.38; color:#12232b; background:#fff; }
    .mono { font-family:'DejaVu Sans Mono',monospace; }
    .serif { font-family:'DejaVu Serif',serif; }
    table.lh { width:100%; margin-bottom:6mm; }
    table.lh td { vertical-align:top; }
    .lh-eyebrow { font-size:7.5pt; font-weight:bold; letter-spacing:1.2pt; text-transform:uppercase; color:`+accent+`; }
    .lh-name { font-size:9.5pt; font-weight:bold; margin-top:1.5mm; }
    .lh-org { font-size:8.5pt; color:#5c6f75; margin-top:0.5mm; }
    .lh-right { text-align:right; }
    .lh-client { font-size:9.5pt; font-weight:bold; }
    .lh-date { font-size:8.5pt; color:#5c6f75; margin-top:0.5mm; }
    .chips { margin-bottom:5mm; }
    .chip { display:inline-block; padding:1.8mm 4mm; border-radius:6mm; font-size:8.5pt; font-weight:bold; margin-right:2.5mm; margin-bottom:2mm; }
    .chip.teal { background:#e1f5f2; color:#0e9c90; }
    .chip.warm { background:#ffe4da; color:#ff6f4d; }
    .lede { font-size:11.5pt; font-weight:bold; max-width:150mm; margin-bottom:6mm; }
    .section-tag { font-size:7.5pt; font-weight:bold; letter-spacing:1.2pt; text-transform:uppercase; color:#5c6f75; margin:0 0 3mm; }
    .rec { border-top:0.5pt solid #dfe6e5; padding:3mm 0 3mm 4mm; margin-top:3mm; border-left:2.2pt solid #ccc; }
    .rec:first-child { border-top:none; padding-top:0; margin-top:0; }
    .rec.warm { border-left-color:#ff6f4d; }
    .rec.teal { border-left-color:#0e9c90; }
    .rec-title { font-size:10.5pt; font-weight:bold; margin-bottom:1mm; }
    .rec-why { font-size:8.5pt; color:#5c6f75; max-width:150mm; }
    table.signoff { width:100%; margin-top:4mm; padding-top:3mm; border-top:0.5pt solid #b9c7c5; }
    .signoff-n { font-size:9.5pt; font-weight:bold; }
    .signoff-o { font-size:8.5pt; color:#5c6f75; }
    .signoff-c { font-size:8.5pt; margin-top:1mm; }
    .fineprint { position:fixed; bottom:-10mm; left:0; right:0; width:174mm;
      border-top:0.5pt solid #dfe6e5; padding-top:2.5mm; font-size:7.5pt; color:#5c6f75; text-align:center; }
    @page { margin:14mm 18mm 20mm 18mm; }
  `;

  return '<!DOCTYPE html><html lang="sk"><head>'
    + '<meta http-equiv="Content-Type" content="text/html; charset=utf-8">'
    + '<title>Váš poistný profil</title><style>'+css+'</style></head><body>'
    + '<table class="lh"><tr>'
      + '<td><div class="lh-eyebrow">Váš poistný profil</div>'
      + '<div class="lh-name">Pripravil/-a '+escapeHtml(ADVISOR.name)+'</div>'
      + (ADVISOR.org ? '<div class="lh-org">'+escapeHtml(ADVISOR.org)+'</div>' : '') + '</td>'
      + '<td class="lh-right"><div class="lh-client">'+escapeHtml(clientName)+'</div>'
      + '<div class="lh-date mono">'+fmtDateSk(TODAY)+'</div></td>'
    + '</tr></table>'
    + '<div class="chips">'+chipsHtml+'</div>'
    + '<div class="lede serif">Na základe vašich odpovedí odporúčame prebrať s poradcom '+recs.length+' '
      + (recs.length===1?'typ krytia':'typov krytia')+' &mdash; v poradí podľa toho, čo vás najviac trápi.</div>'
    + '<div class="section-tag">Odporúčané typy poistenia</div>'
    + recsHtml
    + '<table class="signoff"><tr>'
      + '<td><div class="signoff-n">'+escapeHtml(ADVISOR.name)+'</div>'
      + (ADVISOR.org ? '<div class="signoff-o">'+escapeHtml(ADVISOR.org)+'</div>' : '')
      + '<div class="signoff-c mono">'+escapeHtml(ADVISOR.email)+(ADVISOR.phone ? ' &middot; '+escapeHtml(ADVISOR.phone) : '')+'</div></td>'
    + '</tr></table>'
    + '<div class="fineprint">Odporúčanie typu poistenia, nie konkrétneho produktu. Konečný rozsah krytia určí poradca.</div>'
    + '</body></html>';
}

function doGeneratePdf(){
  const btn = $('pdfBtn') || $('clientPdfBtn');
  const orig = btn.textContent;
  btn.textContent = 'Generujem…'; btn.disabled = true;

  const html = buildReportHtml();
  const clientName = clientLinkLabel || state.contactName.trim() || 'klient';
  const filename = 'Poistny_profil_'+clientName.replace(/\s+/g,'_');

  fetch('../pdf.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ html: html, filename: filename })
  })
  .then(function(r){
    const ct = r.headers.get('Content-Type') || '';
    if (ct.includes('application/json') || ct.includes('text/')) {
      return r.text().then(function(t){ throw new Error('Server: ' + t); });
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.blob();
  })
  .then(function(blob){
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename+'.pdf';
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
    btn.textContent = orig; btn.disabled = false;
    logDocument(TOOL_NAME, clientName, state, CLIENT_TOKEN);
  })
  .catch(function(e){
    console.error(e);
    btn.textContent = orig; btn.disabled = false;
    showToast('Chyba PDF: ' + e.message, 'error');
  });
}

function doRestart(){
  state.step=0;
  state.answers={ status:'', hasDependents:'', hasLoan:'', property:'', existingIns:[], carIns:'', travel:'', concern:'' };
  state.contactName=''; state.touched=false;
  render();
}

/* ===========================================================================
   ŽIADOSTI OD KLIENTOV (poradcovský pohľad — história odkazov)
   MOJE VYGENEROVANÉ DOKUMENTY (poradcovský pohľad — návrat k PDF)
   Zdieľané loadHistoryList/logDocument/escapeHtml — assets/advisor-panel.js
=========================================================================== */
function openHistoryRow(row){
  if(!row || !row.form_data) return;
  Object.assign(state, JSON.parse(row.form_data));
  state.step = QUESTIONS.length;
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function loadClientRequests(){
  loadHistoryList({
    endpoint: '../api/my-client-links.php',
    tool: TOOL_NAME,
    cardId: 'clientRequestsCard',
    listId: 'clientRequestsList',
    rowHtml: function(row){
      const statusLabel = row.status==='submitted' ? 'Vyplnené' : 'Čaká na klienta';
      const date = (row.submitted_at || row.created_at || '').slice(0,10);
      const canLoad = row.status==='submitted' && row.form_data;
      return '<div style="display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0; border-top:1px solid var(--border);">'
        + '<div><div style="font-weight:700; font-size:13.5px;">'+escapeHtml(row.client_label)+'</div>'
        + '<div style="font-size:12px;color:var(--muted);">'+statusLabel+' · '+date+'</div></div>'
        + (canLoad ? '<button type="button" class="btn-ghost" data-open-id="'+row.id+'" style="padding:8px 14px;">Načítať</button>' : '')
        + '</div>';
    },

  });
}

        + '<div style="font-size:12px;color:var(--muted);">'+date+'</div></div>'
        + '<button type="button" class="btn-ghost" data-open-id="'+row.id+'" style="padding:8px 14px;">Otvoriť</button>'

  });
}

/* ===========================================================================
   ODKAZ PRE KLIENTA (poradcovský pohľad — vytvorenie jedinečného odkazu)
=========================================================================== */
function doCreateLink(){
  const label = $('clientLinkLabel').value.trim();
  const field = document.querySelector('[data-k="clientLinkLabel"]');
  if(!label){ field.classList.add('invalid'); return; }
  field.classList.remove('invalid');

  const btn = $('createLinkBtn');
  const orig = btn.textContent;
  btn.textContent = 'Vytváram…'; btn.disabled = true;

  fetch('../api/client-link-create.php', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ tool: TOOL_NAME, clientLabel: label })
  })
  .then(r=>r.json())
  .then(d=>{
    if(!d.url) throw new Error('Nepodarilo sa vytvoriť odkaz.');
    $('createdLinkUrl').value = location.origin + d.url;
    $('createdLinkBox').style.display = 'block';
    btn.textContent = orig; btn.disabled = false;
  })
  .catch(e=>{
    btn.textContent = orig; btn.disabled = false;
    showToast('Chyba: ' + e.message, 'error');
  });
}

/* ===========================================================================
   KLIENTSKY REŽIM S TOKENOM
=========================================================================== */
async function loadClientSession(){
  try{
    const r = await fetch('../api/client-session.php?token='+encodeURIComponent(CLIENT_TOKEN)+'&tool='+TOOL_NAME);
    const d = await r.json();
    if(!d.ok){ showInvalidLink(); return; }
    if(d.advisor && d.advisor.name) Object.assign(ADVISOR, d.advisor);
    if(d.clientLabel) clientLinkLabel = d.clientLabel;
    if(d.formData) Object.assign(state, d.formData);
    render();
  }catch(e){ showInvalidLink(); }
}

function showInvalidLink(){
  document.querySelector('.app').innerHTML = '<div style="padding:60px 30px;text-align:center;">'
    + '<h2>Tento odkaz už nie je platný</h2>'
    + '<p style="color:var(--muted);">Požiadaj poradcu o nový odkaz na vyplnenie.</p></div>';
}

function doClientSubmit(){
  const btn = $('clientSubmitBtn');
  const orig = btn.textContent;
  btn.textContent = 'Odosielam…'; btn.disabled = true;

  fetch('../api/client-submit.php', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ token: CLIENT_TOKEN, tool: TOOL_NAME, formData: state })
  })
  .then(r=>r.json())
  .then(d=>{
    if(!d.ok) throw new Error('Odoslanie zlyhalo.');
    $('clientSubmitCard').style.display = 'none';
    $('thankYouMsg').textContent = 'Ďakujeme! Spoločne si to čoskoro prejdeme. — '+ADVISOR.name;
    $('clientThankYou').style.display = 'block';
  })
  .catch(e=>{
    btn.textContent = orig; btn.disabled = false;
    showToast('Chyba: ' + e.message, 'error');
  });
}

/* ===========================================================================
   HLAVIČKOVÝ PANEL "Poslať klientovi" — dostupný od 1. otázky, nie len na konci
=========================================================================== */
function initSendLinkPanel(){
  if(CLIENT_TOKEN){
    const btn = $('headerSendLinkBtn'); if(btn) btn.remove();
    const panel = $('sendLinkPanel'); if(panel) panel.remove();
    return;
  }
  $('headerSendLinkBtn').addEventListener('click', ()=>{
    const panel = $('sendLinkPanel');
    panel.style.display = panel.style.display==='none' ? 'block' : 'none';
  });
  $('createLinkBtn').addEventListener('click', doCreateLink);
  $('copyLinkBtn').addEventListener('click', ()=>{
    const input = $('createdLinkUrl');
    input.select();
    try{ if(navigator.clipboard) navigator.clipboard.writeText(input.value); }catch(e){}
    const b=$('copyLinkBtn'); const orig=b.textContent; b.textContent='Skopírované ✓'; setTimeout(()=>b.textContent=orig,1600);
  });
}

/* ===========================================================================
   ŠTART
=========================================================================== */
loadAdvisor();
initSendLinkPanel();
if(CLIENT_TOKEN){
  loadClientSession();
} else {
  autoOpenSavedDocument(function(d){
    Object.assign(state, d);
    state.step = QUESTIONS.length;
    render();
  }, doGeneratePdf);
}
render();
