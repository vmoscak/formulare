<!DOCTYPE html>
<html lang="sk"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist – výstup z analýzy</title>



<!-- =========================================================================
     GENERÁTOR CHECKLISTU – VÝSTUP Z FINANČNEJ ANALÝZY
     -------------------------------------------------------------------------
     Celá aplikácia je v tomto jednom súbore: HTML + CSS (v <style>) + JS (dole).
     PDF sa generuje na serveri cez zdieľaný ../pdf.php (Dompdf) — rovnaký
     endpoint ako v ostatných formulároch.

     KDE ČO UPRAVIŤ:
       • Farby / vzhľad ........ zdieľaný dizajnový systém ../assets/ui.css
       • Prednastavené úlohy ... JS, pole DEFAULT_ITEMS
       • Text a nadpisy ........ JS, funkcia buildLetterHtml()
========================================================================== -->

<script src="../assets/theme-init.js"></script>
<script src="../assets/toast.js?v=1"></script>
<link rel="stylesheet" href="../assets/ui.css?v=12">
<style>
  /* odchýlky tejto stránky od zdieľaného dizajnu (assets/ui.css) */
  .flow-step-badge{
    display:inline-flex; align-items:center; gap:6px;
    font-size:10.5px; font-weight:700; letter-spacing:.03em; text-transform:uppercase;
    color:var(--accent); background:var(--accent-soft); border-radius:999px; padding:5px 12px;
    white-space:nowrap;
  }
  .seed-banner{
    display:none; align-items:flex-start; gap:9px;
    font-size:12.5px; line-height:1.5; color:var(--accent-ink);
    background:var(--accent-soft); border:1px solid var(--accent-line);
    border-radius:var(--radius-md); padding:10px 12px; margin-bottom:10px;
  }
  .seed-banner svg{flex:none; margin-top:1px;}
  /* farebné rozlíšenie úlohy podľa toho, kto je zodpovedný */
  .item[data-owner="klient"]{box-shadow:inset 4px 0 0 var(--accent);}
  .item[data-owner="poradca"]{box-shadow:inset 4px 0 0 var(--teal);}
  .item[data-owner="spolocne"]{box-shadow:inset 4px 0 0 var(--amber);}
</style>
</head>
<body>

<div class="app">
  <div class="head">
    <div class="head-left">
      <a href="../nastroje.php" class="back-btn" title="Späť na nástroje">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </a>
      <div class="brand">
        <div class="logo">✓</div>
        <div>
          <b>Checklist</b><br>
          <small>Výstup z finančnej analýzy</small>
        </div>
      </div>
      <span class="flow-step-badge">Krok 3 z 3 · Poistná analýza</span>
    </div>
    <div class="head-actions">
      <div class="avatar" id="avatar">?</div>
    </div>
  </div>

  <div class="body">
    <!-- ============ FORMULÁR ============ -->
    <div class="form">

      <!-- 1. klient a analýza -->
      <div>
        <div class="step-head"><div class="step-num">1</div><div class="step-title">Klient a finančná analýza</div></div>
        <div class="fields">
          <div class="field col-full" data-k="clientName">
            <label>MENO KLIENTA (KLIENTOV)</label>
            <input id="clientName" placeholder="napr. Ján a Mária Novákovci">
            <span class="err">Zadaj meno klienta</span>
          </div>
          <div class="field" data-k="analysisDate">
            <label>DÁTUM FINANČNEJ ANALÝZY</label>
            <input type="date" id="analysisDate">
            <span class="err">Zadaj dátum analýzy</span>
          </div>
          <div class="field" data-k="advisorName">
            <label>MENO PORADCU</label>
            <input id="advisorName" placeholder="Meno a priezvisko poradcu">
            <span class="err">Zadaj meno poradcu</span>
          </div>
        </div>
      </div>

      <!-- 2. úlohy -->
      <div>
        <div class="step-head"><div class="step-num">2</div><div class="step-title">Úlohy a odporúčania</div></div>
        <div class="seed-banner" id="seedBanner">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          <span id="seedBannerMsg"></span>
        </div>
        <div class="items" id="items"></div>
        <button type="button" class="add-item" id="addItem" style="margin-top:10px;">+ Pridať úlohu</button>
      </div>

      <!-- 3. ďalší krok -->
      <div>
        <div class="step-head"><div class="step-num">3</div><div class="step-title">Ďalší krok</div></div>
        <div class="grid2">
          <div class="field" data-k="followupDate">
            <label>TERMÍN ĎALŠIEHO STRETNUTIA <span style="font-weight:500;text-transform:none;">(nepovinné)</span></label>
            <input type="date" id="followupDate">
            <span class="err"></span>
          </div>
        </div>
        <div class="field col-full" data-k="note" style="margin-top:12px;">
          <label>POZNÁMKA <span style="font-weight:500;text-transform:none;">(nepovinné)</span></label>
          <textarea id="note" placeholder="napr. Klient dodá podklady do 7 dní…"></textarea>
          <span class="err"></span>
        </div>
      </div>

      <div class="alert" id="summary" style="display:none;">
        <span class="bang">!</span>
        <span class="msg" id="summaryMsg"></span>
      </div>

      <div class="actions">
        <button class="btn-primary" id="genBtn">Vygenerovať a stiahnuť PDF</button>
        <button class="btn-ghost" id="resetBtn">Vyčistiť</button>
      </div>
    </div>

    <!-- ============ NÁHĽAD ============ -->
    <div class="preview">
      <div class="preview-head">
        <span class="t">Náhľad checklistu</span>
        <span class="live"><i></i>Aktualizuje sa naživo</span>
      </div>
      <div class="preview-tools">
        <button class="tool" id="copyBtn">Kopírovať text</button>
      </div>
      <div class="letter-wrap">
        <iframe id="letterFrame" class="letter-frame" title="Náhľad checklistu"></iframe>
      </div>
    </div>
  </div>
</div>

<script src="../assets/advisor-panel.js"></script>
<script>
/* ===========================================================================
   DÁTA — prednastavené úlohy (dajú sa upraviť / vymazať)
=========================================================================== */
const TODAY = new Date();

const DEFAULT_ITEMS = [
  { text:'Vytvoriť likvidnú finančnú rezervu na neočakávané výdavky', owner:'klient', due:'', done:false },
  { text:'Skontrolovať a prípadne doplniť životné / rizikové poistenie', owner:'spoločne', due:'', done:false },
  { text:'Zrevidovať podmienky existujúceho úveru / hypotéky', owner:'poradca', due:'', done:false },
  { text:'Nastaviť pravidelné investovanie voľných prostriedkov', owner:'klient', due:'', done:false },
];

const OWNERS = { klient:'klient', poradca:'poradca', spolocne:'spoločne' };

/* ===========================================================================
   STAV
=========================================================================== */
let _idSeq = 1;
function withId(it){ return Object.assign({ id:_idSeq++ }, it); }

/* Počet úloh prevzatých zo seedu (Kalkulačka poistného krytia) — len na banner,
   neovplyvňuje ukladanie ani PDF. */
let seededFromAnalysis = 0;
function updateSeedBanner(){
  const el = $('seedBanner'); if(!el) return;
  if(seededFromAnalysis > 0){
    const n = seededFromAnalysis;
    const word = n===1 ? 'úloha prevzatá' : (n>=2 && n<=4 ? 'úlohy prevzaté' : 'úloh prevzatých');
    $('seedBannerMsg').textContent = n+' '+word+' z Kalkulačky poistného krytia — texty môžeš upraviť alebo zmazať.';
    el.style.display = 'flex';
  } else {
    el.style.display = 'none';
  }
}

const state = {
  clientName:'', analysisDate: toISO(TODAY), advisorName:'',
  items: DEFAULT_ITEMS.map(withId),
  followupDate:'', note:'',
  touched:false,
};

/* ===========================================================================
   POMOCNÉ FUNKCIE PRE DÁTUMY
=========================================================================== */
function parseDate(s){ const p=(s||'').split('-').map(Number); if(p.length!==3||!p[0]) return null;
  const d=new Date(p[0],p[1]-1,p[2]); return isNaN(d)?null:d; }
function fmt(d){ return d.getDate()+'. '+(d.getMonth()+1)+'. '+d.getFullYear(); }
function toISO(d){ const p=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }

/* ===========================================================================
   VALIDÁCIA
=========================================================================== */
function validate(){
  const e = {};
  if(!state.clientName.trim()) e.clientName='Zadaj meno klienta';
  if(!parseDate(state.analysisDate)) e.analysisDate='Zadaj dátum analýzy';
  if(!state.advisorName.trim()) e.advisorName='Zadaj meno poradcu';
  return e;
}

/* ===========================================================================
   VYKRESLENIE
=========================================================================== */
const $ = id => document.getElementById(id);

function renderItems(){
  const box = $('items');
  box.innerHTML = state.items.map(function(it){
    return '<div class="item'+(it.done?' done':'')+'" data-id="'+it.id+'" data-owner="'+it.owner+'">'
      + '<div class="item-top">'
      + '<div class="item-check'+(it.done?' on':'')+'" data-act="toggle">'+(it.done?'✓':'')+'</div>'
      + '<div class="item-body">'
      + '<textarea placeholder="Popis úlohy / odporúčania" data-act="text">'+escapeHtml(it.text)+'</textarea>'
      + '<div class="item-meta">'
      + '<select data-act="owner">'
        + Object.keys(OWNERS).map(function(k){ return '<option value="'+k+'"'+(k===it.owner?' selected':'')+'>'+OWNERS[k]+'</option>'; }).join('')
      + '</select>'
      + '<input type="date" value="'+it.due+'" data-act="due">'
      + '</div></div>'
      + '<div class="item-del" data-act="del" title="Odstrániť úlohu">✕</div>'
      + '</div></div>';
  }).join('') || '<div style="font-size:13px;color:var(--muted);">Zatiaľ žiadne úlohy. Pridaj prvú nižšie.</div>';
}

function render(){
  const errors = validate();
  document.querySelectorAll('.field[data-k]').forEach(f=>{
    const k=f.dataset.k;
    const bad = state.touched && errors[k];
    f.classList.toggle('invalid', !!bad);
    const err=f.querySelector('.err'); if(err && errors[k]) err.textContent=errors[k];
  });
  const errCount = Object.keys(errors).length;
  $('summary').style.display = (state.touched && errCount>0) ? 'flex' : 'none';
  $('summaryMsg').textContent = 'Skontroluj zvýraznené polia ('+errCount+') a skús to znova.';

  var _p=(state.clientName||'').trim().split(/\s+/),_av=_p.length>=2?_p[0][0]+_p[_p.length-1][0]:(_p[0]?_p[0][0]:'?');
  $('avatar').textContent=_av.toUpperCase();

  renderItems();
  refreshPreview();
}

function escapeHtml(x){ return String(x).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let _previewTimer=null;
function refreshPreview(){
  if(_previewTimer) clearTimeout(_previewTimer);
  _previewTimer=setTimeout(function(){
    var frame=document.getElementById('letterFrame');
    if(!frame) return;
    frame.onload=function(){
      try{
        var doc=frame.contentDocument;
        var scale=frame.clientWidth/794;
        doc.body.style.transform='scale('+scale+')';
        var contentH=doc.body.scrollHeight;
        frame.style.height=Math.ceil(contentH*scale)+'px';
      }catch(e){}
    };
    frame.srcdoc=buildLetterHtml(true);
  }, 180);
}

/* ===========================================================================
   ZOSTAVENIE LISTU (HTML pre PDF aj náhľad)
=========================================================================== */
function buildLetterHtml(previewMode){
  const analysisDate = parseDate(state.analysisDate) ? fmt(parseDate(state.analysisDate)) : '…';
  const followupDate = parseDate(state.followupDate) ? fmt(parseDate(state.followupDate)) : '';

  const rows = state.items.map(function(it){
    const due = parseDate(it.due) ? fmt(parseDate(it.due)) : '—';
    return '<tr class="'+(it.done?'done':'')+'">'
      + '<td class="box"><span class="chk">'+(it.done?'X':'')+'</span></td>'
      + '<td class="tx">'+escapeHtml(it.text||'…')+'</td>'
      + '<td class="ow">'+escapeHtml(OWNERS[it.owner]||it.owner||'')+'</td>'
      + '<td class="du">'+escapeHtml(due)+'</td>'
      + '</tr>';
  }).join('');

  const body = `
    <div class="pdf-topbar"></div><div class="doctitle">Checklist – výstup z analýzy</div>
    <div class="meta">
      <div><strong>Klient:</strong> ${escapeHtml(state.clientName||'…')}</div>
      <div><strong>Dátum analýzy:</strong> ${escapeHtml(analysisDate)}</div>
      <div><strong>Poradca:</strong> ${escapeHtml(state.advisorName||'…')}</div>
    </div>
    <table class="tasks">
      <thead><tr><th></th><th>Úloha / odporúčanie</th><th>Zodpovedný</th><th>Termín</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="4" style="color:#8b94a3;">Žiadne úlohy</td></tr>'}</tbody>
    </table>
    ${followupDate ? '<div class="followup"><strong>Ďalšie stretnutie:</strong> '+escapeHtml(followupDate)+'</div>' : ''}
    ${state.note.trim() ? '<div class="note"><strong>Poznámka:</strong> '+escapeHtml(state.note.trim())+'</div>' : ''}
    <div class="footer-bar">
      <table><tr>
        <td class="fl">${escapeHtml(state.clientName||'…')}</td>
        <td class="fr">Checklist – výstup z analýzy</td>
      </tr></table>
    </div>`;

  const css = `
    div,p,table,tr,td,th,strong,span { box-sizing:border-box; margin:0; padding:0; }
    body { margin:0; padding:0; font-family:'DejaVu Sans',sans-serif; font-size:11pt; line-height:1.6; color:#20242b; background:#fff; }
    .pdf-topbar { height:3mm; background:#059669; border-radius:0.8mm; margin-bottom:6mm; } .doctitle { text-align:center; font-size:16pt; letter-spacing:2pt; text-transform:uppercase; font-weight:bold;
      padding:7pt 0; border-top:1pt solid #20242b; border-bottom:1pt solid #20242b; margin-bottom:8mm; }
    .meta { font-size:10.5pt; margin-bottom:8mm; }
    .meta div { margin-bottom:2mm; }
    table.tasks { width:100%; border-collapse:collapse; margin-bottom:6mm; }
    table.tasks th { text-align:left; font-size:8.5pt; text-transform:uppercase; letter-spacing:.5pt; color:#8b94a3;
      border-bottom:1pt solid #ccc; padding:3mm 2mm; }
    table.tasks td { border-bottom:0.5pt solid #e2e6ee; padding:3mm 2mm; font-size:10.5pt; vertical-align:top; }
    table.tasks tr.done td.tx { color:#9aa2b1; }
    td.box { width:8mm; }
    .chk { display:inline-block; width:4mm; height:4mm; border:1pt solid #333; text-align:center;
      line-height:4mm; font-size:8pt; font-weight:bold; }
    td.ow { width:26mm; color:#515a6b; }
    td.du { width:26mm; color:#515a6b; }
    .followup, .note { font-size:10.5pt; margin-bottom:4mm; }
    .footer-bar table { width:100%; border-collapse:collapse; }
    .footer-bar td.fr { text-align:right; }
    .footer-bar { position:fixed; bottom:-22mm; left:0; right:0; width:166mm; border-top:0.5pt solid #ccc; padding-top:4pt; font-size:8.5pt; color:#999; }
    @page{ margin:24mm 22mm 32mm 22mm; }
  `;

  const previewFonts = `
    @font-face { font-family:'DejaVu Sans'; src:url('../vendor/dompdf/lib/fonts/DejaVuSans.ttf'); }
    @font-face { font-family:'DejaVu Sans'; font-weight:bold; src:url('../vendor/dompdf/lib/fonts/DejaVuSans-Bold.ttf'); }
  `;
  let finalCss = css;
  if(previewMode) finalCss = previewFonts + css + ' html{ overflow:hidden; background:#fff; } body{ box-sizing:border-box; width:210mm; padding:24mm 22mm 32mm 22mm; background:#fff; transform-origin:top left; } .footer-bar{ position:static; margin-top:20mm; width:auto; }';

  return '<!DOCTYPE html><html lang="sk"><head>'
    +'<meta http-equiv="Content-Type" content="text/html; charset=utf-8">'
    +'<title>Checklist</title>'
    +'<style>'+finalCss+'</style></head><body>'+body+'</body></html>';
}

/* ===========================================================================
   AKCIE — PDF (server), kopírovanie, reset
=========================================================================== */
function doPDF(){
  state.touched=true; render();
  const errors=validate();
  if(Object.keys(errors).length>0) return;

  const btn=$('genBtn');
  btn.textContent='Generujem…'; btn.disabled=true;

  const letterHtml=buildLetterHtml();
  const filename='Checklist_'+(state.clientName||'klient').replace(/\s+/g,'_');

  fetch('../pdf.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ html: letterHtml, filename: filename })
  })
  .then(function(r){
    const ct = r.headers.get('Content-Type') || '';
    if (ct.includes('application/json') || ct.includes('text/')) {
      return r.text().then(function(t){ throw new Error('Server: ' + t); });
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.blob();
  })
  .then(function(blob){
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=filename+'.pdf';
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
    btn.textContent='Vygenerovať a stiahnuť PDF'; btn.disabled=false;
    logDocument('checklist-analyza', state.clientName||'Klient', state, undefined);
  })
  .catch(function(e){
    console.error(e);
    btn.textContent='Vygenerovať a stiahnuť PDF'; btn.disabled=false;
    showToast('Chyba PDF: ' + e.message, 'error');
  });
}

function doCopy(){
  const analysisDate = parseDate(state.analysisDate) ? fmt(parseDate(state.analysisDate)) : '…';
  const followupDate = parseDate(state.followupDate) ? fmt(parseDate(state.followupDate)) : '';
  const lines = ['CHECKLIST – VÝSTUP Z ANALÝZY','',
    'Klient: '+(state.clientName||'…'),
    'Dátum analýzy: '+analysisDate,
    'Poradca: '+(state.advisorName||'…'),''];
  state.items.forEach(function(it){
    const due = parseDate(it.due) ? fmt(parseDate(it.due)) : '';
    lines.push('['+(it.done?'X':' ')+'] '+it.text+' — '+(OWNERS[it.owner]||it.owner)+(due?(' (do '+due+')'):''));
  });
  if(followupDate) lines.push('','Ďalšie stretnutie: '+followupDate);
  if(state.note.trim()) lines.push('','Poznámka: '+state.note.trim());
  try{ if(navigator.clipboard) navigator.clipboard.writeText(lines.join('\n')); }catch(e){}
  const b=$('copyBtn'); b.textContent='Skopírované ✓'; setTimeout(()=>b.textContent='Kopírovať text',1600);
}

function doReset(){
  Object.assign(state,{
    clientName:'', analysisDate: toISO(TODAY), advisorName:'',
    items: DEFAULT_ITEMS.map(withId),
    followupDate:'', note:'', touched:false,
  });
  seededFromAnalysis = 0;
  syncInputs(); render(); updateSeedBanner();
}

function syncInputs(){
  ['clientName','analysisDate','advisorName','followupDate','note'].forEach(k=>{ if($(k)) $(k).value = state[k]; });
}

/* ===========================================================================
   UDALOSTI
=========================================================================== */
function bind(){
  ['clientName','analysisDate','advisorName','followupDate','note'].forEach(k=>{
    if($(k)) $(k).addEventListener('input', e=>{ state[k]=e.target.value; render(); });
  });

  $('addItem').addEventListener('click', ()=>{
    state.items.push(withId({ text:'', owner:'klient', due:'', done:false }));
    render();
  });

  $('items').addEventListener('click', e=>{
    const row = e.target.closest('.item'); if(!row) return;
    const id = Number(row.dataset.id);
    const it = state.items.find(x=>x.id===id); if(!it) return;
    const act = e.target.closest('[data-act]'); if(!act) return;
    if(act.dataset.act==='toggle'){ it.done=!it.done; render(); }
    if(act.dataset.act==='del'){ state.items = state.items.filter(x=>x.id!==id); render(); }
  });

  const onItemFieldChange = e=>{
    const row = e.target.closest('.item'); if(!row) return;
    const id = Number(row.dataset.id);
    const it = state.items.find(x=>x.id===id); if(!it) return;
    const act = e.target.dataset.act;
    if(act==='text') it.text=e.target.value;
    if(act==='owner'){ it.owner=e.target.value; row.dataset.owner=it.owner; }
    if(act==='due') it.due=e.target.value;
    refreshPreview();
  };
  $('items').addEventListener('input', onItemFieldChange);
  $('items').addEventListener('change', onItemFieldChange);

  $('genBtn').addEventListener('click', doPDF);
  $('copyBtn').addEventListener('click', doCopy);
  $('resetBtn').addEventListener('click', doReset);
}

/* ===========================================================================
   ŠTART
=========================================================================== */
(function init(){
  const seedParam = new URLSearchParams(location.search).get('seed');
  if(seedParam){
    try{
      const seed = JSON.parse(seedParam);
      if(seed.clientName) state.clientName = seed.clientName;
      if(seed.advisorName) state.advisorName = seed.advisorName;
      if(Array.isArray(seed.items) && seed.items.length){
        state.items = seed.items.map(function(it){ return withId({ text: it.text||'', owner: it.owner||'klient', due:'', done:false }); });
        seededFromAnalysis = state.items.length;
      }
    }catch(e){ /* ticho ignoruj, ostanú predvolené úlohy */ }
  }
  syncInputs(); bind(); render(); updateSeedBanner();
  autoOpenSavedDocument(function(d){ Object.assign(state, d); state.touched = true; syncInputs(); render(); }, doPDF);
})();
</script>
