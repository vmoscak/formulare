     + PDF cez zdieľaný ../pdf.php (Dompdf).

       • Metodika/násobky ................ JS, konštanty pri computeSemafor()

<script>
/* ===========================================================================
   METODIKA — rovnaký princíp ako financna-medzera (referenčná suma, 55 %
   štátna PN dávka z hrubého príjmu, prevod čistého príjmu na hrubý pre
   rok 2026), zjednodušené na jedinú referenčnú sumu bez záväzkov a detí.
=========================================================================== */
const FUNERAL_COST = 3000;
/* Úmrtie sa pri jednotlivcovi a v páre rieši úplne inak (rovnako ako vo
   financna-medzera): jednotlivec bez partnera nemá nikoho, kto by dlhodobo
   potreboval náhradu jeho príjmu — rieši sa len krátky preklenovací bridge
   (dedičské konanie). Pár naopak potrebuje dlhodobé zabezpečenie pozostalého
   partnera, preto oveľa vyšší násobok. Tento nástroj nezbiera záväzky/deti
   (na to slúži plná Kalkulačka poistného krytia), preto sa pri jednotlivcovi
   ako orientačná náhrada za splátku záväzkov použijú mesačné výdavky. */
const DEATH_MONTHS_SINGLE = 12;
const DEATH_MONTHS_COUPLE = 60;
const DISABILITY_MONTHS = 36;
const CRITICAL_ILLNESS_MONTHS = 36;
const PERMANENT_INJURY_MONTHS = 60;
const RESERVE_MONTHS = 6;
const STATE_SICKPAY_RATIO = 0.55;
const LEVY_RATE_EMPLOYEE = 0.144;
const NCZD_MONTHLY_2026 = 497.23;
const TAX_RATE_BASE = 0.19;

function grossFromNet(net){
  net = num(net);
  if(net<=0) return 0;
  return (net - NCZD_MONTHLY_2026*TAX_RATE_BASE) / ((1-LEVY_RATE_EMPLOYEE)*(1-TAX_RATE_BASE));
}

const CATS = [
  { key:'death', label:'Úmrtie', unit:'eur' },
  { key:'disability', label:'Invalidita', unit:'eur' },
  { key:'criticalIllness', label:'Kritické choroby', unit:'eur' },
  { key:'permanentInjury', label:'Trvalé následky', unit:'eur' },
  { key:'pn', label:'Dlhodobá PN', unit:'eurday' },
  { key:'reserve', label:'Finančná rezerva', unit:'eur' },
];

const state = {
  hasPartner:false, income:'', partnerIncome:'', expenses:'',
  existingDeath:'', existingDisability:'', existingCriticalIllness:'', existingPermanentInjury:'', existingPn:'',
  savings:'', clientName:'',
};

const $ = id => document.getElementById(id);
function num(v){ const n = Number(v); return isFinite(n) && n > 0 ? n : 0; }
function eur(n){ return Math.round(n).toLocaleString('sk-SK') + ' €'; }
function eurDay(n){ return (Math.round(n*100)/100).toLocaleString('sk-SK') + ' €/deň'; }
function escapeHtml(x){ return String(x==null?'':x).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function computeSemafor(){
  const income = num(state.income);
  const partnerIncome = num(state.partnerIncome);
  const expenses = num(state.expenses);
  const hasPartner = !!state.hasPartner;
  const refSum = hasPartner ? expenses/2 : expenses;
  const grossIncome = grossFromNet(income);
  const statePnBenefit = grossIncome*STATE_SICKPAY_RATIO;
  const monthlyShortfallPn = Math.max(0, expenses - (hasPartner?partnerIncome:0) - statePnBenefit);
  const neededDailyPn = monthlyShortfallPn/30;

  const hasBasicInputs = income>0 && expenses>0;

  return {
    hasBasicInputs,
    death: { need: hasBasicInputs ? FUNERAL_COST + (hasPartner ? DEATH_MONTHS_COUPLE : DEATH_MONTHS_SINGLE)*refSum : 0, covered: num(state.existingDeath) },
    disability: { need: hasBasicInputs ? DISABILITY_MONTHS*refSum : 0, covered: num(state.existingDisability) },
    criticalIllness: { need: hasBasicInputs ? CRITICAL_ILLNESS_MONTHS*refSum : 0, covered: num(state.existingCriticalIllness) },
    permanentInjury: { need: hasBasicInputs ? PERMANENT_INJURY_MONTHS*refSum : 0, covered: num(state.existingPermanentInjury) },
    pn: { need: hasBasicInputs ? neededDailyPn : 0, covered: num(state.existingPn) },
    reserve: { need: expenses>0 ? RESERVE_MONTHS*expenses : 0, covered: num(state.savings) },
  };
}

function lightFor(need, covered){
  if (need <= 0) return 'gray';
  const ratio = covered/need;
  if (ratio < 0.4) return 'red';
  if (ratio < 0.8) return 'amber';
  return 'green';
}

function noteFor(light, need, covered, unit){
  const fmt = unit === 'eurday' ? eurDay : eur;
  if (light === 'gray') return 'Doplň príjem a výdavky';
  if (light === 'green') return 'Dostatočne kryté';
  const gap = Math.max(0, need - covered);
  return 'Chýba cca ' + fmt(gap);
}

/* ===========================================================================
   VYKRESLENIE
=========================================================================== */
function render(){
  $('partnerIncomeField').style.display = state.hasPartner ? '' : 'none';
  const r = computeSemafor();

  let known = 0, green = 0;
  const tiles = CATS.map(function(c){
    const d = r[c.key];
    const light = lightFor(d.need, d.covered);
    if (light !== 'gray') known++;
    if (light === 'green') green++;
    const pct = d.need > 0 ? Math.round(Math.min(1, d.covered/d.need) * 100) : null;
    return '<div class="sem-tile">'
      + '<div class="sem-top"><span class="sem-dot ' + light + '"></span><span class="sem-name">' + escapeHtml(c.label) + '</span></div>'
      + '<div class="sem-pct">' + (pct === null ? '—' : pct + ' %') + '</div>'
      + '<div class="sem-note">' + noteFor(light, d.need, d.covered, c.unit) + '</div>'
      + '</div>';
  }).join('');
  $('semGrid').innerHTML = tiles;

  if (known > 0) {
    $('semSummary').style.display = 'flex';
    $('semSumNum').textContent = green + '/' + known;
    $('semSumTxt').textContent = green === known
      ? 'Všetky vyplnené oblasti sú dostatočne kryté.'
      : 'oblastí dostatočne krytých (aspoň 80 % odporúčanej sumy).';
  } else {
    $('semSummary').style.display = 'none';
  }

  return r;
}

/* ===========================================================================
   AKCIE
=========================================================================== */
function summaryText(r){
  const lines = CATS.map(function(c){
    const d = r[c.key];
    const light = lightFor(d.need, d.covered);
    const fmt = c.unit === 'eurday' ? eurDay : eur;
    const lightLabel = { red:'🔴', amber:'🟠', green:'🟢', gray:'⚪' }[light];
    return lightLabel + ' ' + c.label + ': ' + (d.need>0 ? fmt(d.covered) + ' / ' + fmt(d.need) : 'doplň vstupy');
  });
  return 'Poistný semafor' + (state.clientName.trim() ? ' — ' + state.clientName.trim() : '') + '\n\n' + lines.join('\n')
    + '\n\nOrientačný rýchly prepočet — pre presné zadanie so záväzkami a deťmi použi Kalkulačku poistného krytia.';
}

function doCopy(){
  const r = computeSemafor();
  const txt = summaryText(r);
  try{ if(navigator.clipboard) navigator.clipboard.writeText(txt); }catch(e){}
  const b = $('copyBtn'); const orig = b.textContent;
  b.textContent = 'Skopírované ✓'; setTimeout(function(){ b.textContent = orig; }, 1600);
}

function doReset(){
  state.hasPartner = false; state.income=''; state.partnerIncome=''; state.expenses='';
  state.existingDeath=''; state.existingDisability=''; state.existingCriticalIllness='';
  state.existingPermanentInjury=''; state.existingPn=''; state.savings='';
  ['hasPartner','income','partnerIncome','expenses','existingDeath','existingDisability',
   'existingCriticalIllness','existingPermanentInjury','existingPn','savings'].forEach(function(id){
    const el = $(id);
    if (el.type === 'checkbox') el.checked = false; else el.value = '';
  });
  render();
}

/* ===========================================================================
   PDF PRE KLIENTA (server-side Dompdf cez zdieľaný ../pdf.php, presné A4)
=========================================================================== */
const LIGHT_COLOR = { red:'#e11d48', amber:'#d97706', green:'#059669', gray:'#9ca3af' };

function buildLetterHtml(r){
  const clientName = state.clientName.trim() || 'Klient';
  const today = new Date();
  const SK_MONTHS = ['január','február','marec','apríl','máj','jún','júl','august','september','október','november','december'];
  const dateStr = today.getDate() + '. ' + SK_MONTHS[today.getMonth()] + ' ' + today.getFullYear();

  const tiles = CATS.map(function(c){
    const d = r[c.key];
    const light = lightFor(d.need, d.covered);
    const fmt = c.unit === 'eurday' ? eurDay : eur;
    const pct = d.need > 0 ? Math.round(Math.min(1, d.covered/d.need) * 100) + ' %' : '—';
    return '<div class="sm-tile">'
      + '<div class="sm-top"><span class="sm-dot" style="background:' + LIGHT_COLOR[light] + ';"></span>' + escapeHtml(c.label) + '</div>'
      + '<div class="sm-pct">' + pct + '</div>'
      + '<div class="sm-note">' + noteFor(light, d.need, d.covered, c.unit) + '</div>'
      + '</div>';
  }).join('');

  const css = `
    @font-face { font-family:'DejaVu Sans'; src:url('../vendor/dompdf/lib/fonts/DejaVuSans.ttf'); }
    @font-face { font-family:'DejaVu Sans'; font-weight:bold; src:url('../vendor/dompdf/lib/fonts/DejaVuSans-Bold.ttf'); }
    * { box-sizing:border-box; }
    div,p,span { margin:0; padding:0; }
    body { margin:0; padding:0; font-family:'DejaVu Sans',sans-serif; font-size:10.5pt; line-height:1.5; color:#20242b; background:#fff; }
    .pdf-topbar { height:3mm; background:#0ea5e9; border-radius:0.8mm; margin-bottom:6mm; }
    .doctitle { text-align:center; font-size:16pt; letter-spacing:.5pt; font-weight:bold; padding:7pt 0 2pt; }
    .card-sub { text-align:center; font-size:10.5pt; color:#666; margin-bottom:5mm; }
    .meta { text-align:center; font-size:9pt; color:#8a8a8a; margin-bottom:9mm; padding-bottom:5mm; border-bottom:1pt solid #e5e5e5; }
    .sm-tile { display:inline-block; width:47%; margin:0 2% 4mm 0; padding:3mm 4mm; border:0.75pt solid #e5e5e5; border-radius:2mm; vertical-align:top; }
    .sm-top { font-size:10.5pt; font-weight:bold; margin-bottom:2mm; }
    .sm-dot { display:inline-block; width:8pt; height:8pt; border-radius:50%; margin-right:5pt; }
    .sm-pct { font-size:14pt; font-weight:bold; }
    .sm-note { font-size:9pt; color:#666; margin-top:1mm; }
    .concl { margin-top:4mm; padding:4mm 5mm; background:#eef2ff; border-radius:2mm; font-size:9.5pt; color:#3730a3; }
    @page{ margin:20mm 20mm 20mm 20mm; }
  `;

  return '<!DOCTYPE html><html lang="sk"><head>'
    + '<meta http-equiv="Content-Type" content="text/html; charset=utf-8">'
    + '<title>Poistný semafor</title><style>' + css + '</style></head><body>'
    + '<div class="pdf-topbar"></div><div class="doctitle">Poistný semafor</div>'
    + '<div class="card-sub">Vizuálny audit krytia na 1 klik</div>'
    + '<div class="meta">' + escapeHtml(clientName) + ' &middot; ' + dateStr + '</div>'
    + tiles
    + '<div class="concl">Orientačný rýchly prepočet — pre presné zadanie so záväzkami a deťmi sa použije Kalkulačka poistného krytia.</div>'
    + '</body></html>';
}

function doPDF(){
  const btn = $('pdfBtn'); const orig = btn.textContent;
  btn.textContent = 'Generujem…'; btn.disabled = true;

  const r = computeSemafor();
  const html = buildLetterHtml(r);
  const filename = 'Poistny_semafor' + (state.clientName.trim() ? '_' + state.clientName.trim().replace(/\s+/g,'_') : '');

  fetch('../pdf.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ html: html, filename: filename })
  })
  .then(function(r){
    const ct = r.headers.get('Content-Type') || '';
    if (ct.includes('application/json') || ct.includes('text/')) {
      return r.text().then(function(t){ throw new Error('Server: ' + t); });
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.blob();
  })
  .then(function(blob){
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename + '.pdf';
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
    btn.textContent = orig; btn.disabled = false;
    logDocument('poistny-semafor', state.clientName.trim() || 'Klient', state, undefined);
  })
  .catch(function(e){
    console.error(e);
    btn.textContent = orig; btn.disabled = false;
    showToast('Chyba PDF: ' + e.message, 'error');
  });
}

/* ===========================================================================
   UDALOSTI
=========================================================================== */
function bind(){
  ['income','partnerIncome','expenses','existingDeath','existingDisability',
   'existingCriticalIllness','existingPermanentInjury','existingPn','savings'].forEach(function(id){
    $(id).addEventListener('input', function(e){ state[id] = e.target.value; render(); });
  });
  $('hasPartner').addEventListener('change', function(e){ state.hasPartner = e.target.checked; render(); });
  $('clientName').addEventListener('input', function(e){ state.clientName = e.target.value; });
  $('copyBtn').addEventListener('click', doCopy);
  $('pdfBtn').addEventListener('click', doPDF);
  $('resetBtn').addEventListener('click', doReset);
}

/* ===========================================================================
   ŠTART
=========================================================================== */
(function init(){
  bind(); render();
})();
</script>
