<!DOCTYPE html>
<html lang="sk"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warm-Intro WhatsApp generátor</title>

<!-- =========================================================================
     WARM-INTRO WHATSAPP GENERÁTOR — samostatný editovateľný súbor
     -------------------------------------------------------------------------
     Priateľská prvá správa pre nový kontakt, ktorý ťa niekto odporučil.
     Bez PDF — len text na kopírovanie alebo priamy odkaz do WhatsAppu (wa.me).

     Poznámka: texty jednotlivých tónov sú zámerne len pracovná verzia —
     presné znenie sa bude ešte dolaďovať.

     KDE ČO UPRAVIŤ:
       • Tóny správy ............ JS, objekt TONES
       • Text správy ............ JS, funkcia buildMessage()
========================================================================== -->

<script src="../assets/theme-init.js"></script>
<link rel="stylesheet" href="../assets/ui.css?v=8">
</head>
<body>

<div class="app">
  <div class="head">
    <div class="head-left">
      <a href="../nastroje.php" class="back-btn" title="Späť na formuláre">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </a>
      <div class="brand">
        <div class="logo">W</div>
        <div>
          <b>Warm-Intro WhatsApp generátor</b><br>
          <small>Priateľská prvá správa pre odporúčaný kontakt</small>
        </div>
      </div>
    </div>
    <div class="head-actions">
      <div class="avatar" id="avatar">?</div>
    </div>
  </div>

  <div class="body">
    <!-- ============ FORMULÁR ============ -->
    <div class="form">

      <div>
        <div class="step-head"><div class="step-num">1</div><div class="step-title">Nový kontakt</div></div>
        <div class="fields">
          <div class="field col-full" data-k="contactName">
            <label>MENO</label>
            <input id="contactName" placeholder="napr. Zuzana">
            <span class="err">Zadaj meno kontaktu</span>
          </div>
          <div class="field col-full" data-k="contactPhone">
            <label>TELEFÓN <span style="font-weight:500;text-transform:none;">(nepovinné, pre priamy odkaz do WhatsAppu)</span></label>
            <input id="contactPhone" placeholder="+421 900 000 000">
            <span class="err"></span>
          </div>
        </div>
      </div>

      <div>
        <div class="step-head"><div class="step-num">2</div><div class="step-title">Kto odporučil</div></div>
        <div class="fields">
          <div class="field col-full" data-k="referrerName">
            <label>MENO ODPORÚČAJÚCEHO/-EJ</label>
            <input id="referrerName" placeholder="napr. Peter Novák">
            <span class="err">Zadaj meno odporúčajúceho/-ej</span>
          </div>
        </div>
      </div>

      <div>
        <div class="step-head"><div class="step-num">3</div><div class="step-title">Tón správy</div></div>
        <div class="grid3" id="tones"></div>
      </div>

      <div class="alert" id="summary" style="display:none;">
        <span class="bang">!</span>
        <span class="msg" id="summaryMsg"></span>
      </div>
    </div>

    <!-- ============ NÁHĽAD ============ -->
    <div class="preview">
      <div class="preview-head">
        <span class="t">Náhľad správy</span>
        <span class="live"><i></i>Aktualizuje sa naživo</span>
      </div>
      <div class="preview-tools">
        <button class="tool" id="copyBtn">Kopírovať text</button>
        <button class="tool" id="waBtn">Otvoriť WhatsApp</button>
      </div>
      <div class="letter-wrap">
        <div id="msgPreview" style="background:#fff; border-radius:8px; padding:20px; font-size:14px; line-height:1.7; white-space:pre-wrap; color:#20242b;"></div>
      </div>
    </div>
  </div>
</div>

<script src="../assets/advisor-panel.js"></script>
<script>
/* ===========================================================================
   DÁTA
=========================================================================== */
const TONES = {
  priatelsky: { label:'Priateľský', sub:'Neformálny, teplý tón', tile:'PR' },
  formalny:   { label:'Formálny', sub:'Zdvorilý, vykanie', tile:'FO' },
  strucny:    { label:'Stručný', sub:'Krátka rýchla správa', tile:'ST' },
};

const state = { contactName:'', contactPhone:'', referrerName:'', tone:'priatelsky', advisorName:'', advisorPhone:'', touched:false };

function validate(){
  const e = {};
  if(!state.contactName.trim()) e.contactName='Zadaj meno kontaktu';
  if(!state.referrerName.trim()) e.referrerName='Zadaj meno odporúčajúceho/-ej';
  return e;
}

const $ = id => document.getElementById(id);

function renderTones(){
  $('tones').innerHTML = Object.keys(TONES).map(function(k){
    const t=TONES[k], sel=k===state.tone?' sel':'';
    return '<div class="type'+sel+'" data-tone="'+k+'">'
      + '<div class="tile">'+t.tile+'</div>'
      + '<div><div class="t-label">'+t.label+'</div><div class="t-sub">'+t.sub+'</div></div></div>';
  }).join('');
}

function syncInputs(){
  ['contactName','contactPhone','referrerName'].forEach(function(k){ if($(k)) $(k).value = state[k]; });
}

function buildMessage(){
  const name = state.contactName.trim();
  const referrer = state.referrerName.trim() || '…';
  const advisor = state.advisorName || '…';
  const phoneLine = state.advisorPhone ? '\n' + state.advisorPhone : '';

  if (state.tone === 'formalny') {
    return 'Dobrý deň' + (name ? ' ' + name : '') + ',\n\n'
      + 'volám sa ' + advisor + ' a pôsobím ako finančný poradca. Váš kontakt mi odovzdal/-a ' + referrer
      + ', ktorý/-á sa domnieva, že by som Vám mohol/-la byť nápomocný/-á v oblasti financií a poistenia.'
      + '\n\nRád by som si s Vami dohodol krátky telefonát alebo stretnutie, ak by Vám to vyhovovalo. Dajte mi, prosím, vedieť, kedy sa Vám to hodí.'
      + '\n\nS pozdravom,\n' + advisor + phoneLine;
  }
  if (state.tone === 'strucny') {
    return 'Ahoj' + (name ? ' ' + name : '') + ', som ' + advisor + ' (finančný poradca), kontakt mi dal/-a ' + referrer + '. Ozvem sa ti, keď budeš mať chvíľku?'
      + '\n' + advisor + phoneLine;
  }
  // priateľský (predvolený)
  return 'Ahoj ' + (name || '') + ','
    + '\n\nvolám sa ' + advisor + ' a som finančný poradca. Kontakt na teba mi dal/-a '
    + referrer + ' — spomínal/-a, že by som ti mohol/-la pomôcť s financiami/poistením.'
    + '\n\nNie je to žiadny záväzok, len krátke predstavenie 🙂 Ak by ti vyhovoval krátky telefonát alebo stretnutie, daj vedieť, kedy sa ti to hodí.'
    + '\n\n' + advisor + phoneLine;
}

function render(){
  const errors = validate();
  document.querySelectorAll('.field[data-k]').forEach(function(f){
    const k=f.dataset.k;
    const bad = state.touched && errors[k];
    f.classList.toggle('invalid', !!bad);
    const err=f.querySelector('.err'); if(err && errors[k]) err.textContent=errors[k];
  });
  const errCount = Object.keys(errors).length;
  $('summary').style.display = (state.touched && errCount>0) ? 'flex' : 'none';
  $('summaryMsg').textContent = 'Skontroluj zvýraznené polia ('+errCount+') a skús to znova.';

  var _p=(state.contactName||'').trim().split(/\s+/), _av=_p.length>=2?_p[0][0]+_p[_p.length-1][0]:(_p[0]?_p[0][0]:'?');
  $('avatar').textContent=_av.toUpperCase();

  $('msgPreview').textContent = buildMessage();
}

function doCopy(){
  const txt = buildMessage();
  try{ if(navigator.clipboard) navigator.clipboard.writeText(txt); }catch(e){}
  const b=$('copyBtn'); b.textContent='Skopírované ✓'; setTimeout(function(){ b.textContent='Kopírovať text'; },1600);
  state.touched=true; render();
  logDocument('warm-intro-whatsapp', state.contactName||'Kontakt', state, undefined);
}

function doWhatsApp(){
  state.touched=true; render();
  const errors=validate();
  if(Object.keys(errors).length>0) return;
  const phone = (state.contactPhone||'').replace(/[^\d+]/g,'').replace(/^00/,'+').replace(/^\+?/, '');
  const txt = encodeURIComponent(buildMessage());
  const url = phone ? 'https://wa.me/' + phone + '?text=' + txt : 'https://wa.me/?text=' + txt;
  window.open(url, '_blank');
  logDocument('warm-intro-whatsapp', state.contactName||'Kontakt', state, undefined);
}

function bind(){
  document.addEventListener('click', function(e){
    const t=e.target.closest('[data-tone]'); if(t){ state.tone=t.dataset.tone; renderTones(); render(); return; }
  });
  document.addEventListener('input', function(e){
    ['contactName','contactPhone','referrerName'].forEach(function(k){
      if(e.target.id===k){ state[k]=e.target.value; render(); }
    });
  });
  $('copyBtn').addEventListener('click', doCopy);
  $('waBtn').addEventListener('click', doWhatsApp);
}

(function init(){
  renderTones(); syncInputs(); bind(); render();
  fetch('/api/whoami.php', { credentials:'same-origin' })
    .then(function(r){ return r.ok ? r.json() : {}; })
    .then(function(adv){ if(adv && adv.id){ state.advisorName = adv.name || ''; state.advisorPhone = adv.phone || ''; render(); } })
    .catch(function(){});
})();
</script>

<script src="/assets/shell.js?v=10"></script>
</body></html>
